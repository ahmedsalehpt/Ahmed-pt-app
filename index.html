<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Ahmed PT">
<meta name="theme-color" content="#060810">
<title>Ahmed Personal Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--bg:#060810;--c1:#0D1117;--c2:#111827;--bdr:#1A2340;
--tx:#E8F0FF;--m1:#6B7FA3;--m2:#2A3450;--m3:#1A2340;
--green:#16A34A;--blue:#4F86F7;--pink:#EC4899;--amber:#D97706;--red:#DC2626;--purple:#8B5CF6;
--acc:#2563EB;--acc-l:#4F86F7;--acc-d:#1A3F9E;--cobalt-glow:rgba(37,99,235,0.15);
--shadow-cobalt:0 8px 24px rgba(37,99,235,0.4);
--font-body:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
--font-mono:'DM Mono','Courier New',monospace;
--font-display:'Bebas Neue',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--font-body);overflow-x:hidden;-webkit-font-smoothing:antialiased;font-weight:400}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 20%,rgba(37,99,235,0.12) 0%,transparent 60%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 10%,#2563EB 40%,#4F86F7 60%,transparent 90%);z-index:9999;pointer-events:none}
body[data-light]::before{display:none}
body[data-light]::after{background:linear-gradient(90deg,transparent 10%,#2563EB 40%,#4F86F7 60%,transparent 90%)}
input,textarea,select,button{font-family:var(--font-body);-webkit-appearance:none;appearance:none;outline:none;border:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
button{cursor:pointer;background:none;color:inherit}
button:active{opacity:.8;transform:scale(.97)}
textarea{resize:none}
#app{min-height:100vh;padding-bottom:80px;position:relative;z-index:1}
.page{max-width:640px;margin:0 auto;padding:14px}
.hdr{position:sticky;top:0;z-index:90;background:rgba(6,8,16,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:12px 14px 0}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hdr-sub{font-family:var(--font-mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--acc);font-weight:400;margin-bottom:2px}
.hdr-title{font-size:22px;font-weight:600;color:var(--tx);letter-spacing:-.5px}
.dtabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;padding-bottom:0}
.dtabs::-webkit-scrollbar{display:none}
.dtab{padding:7px 12px;border-radius:7px 7px 0 0;font-family:var(--font-mono);font-size:9px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--m1);white-space:nowrap;border:1px solid transparent;border-bottom:none;cursor:pointer}
.dtab.on{background:var(--c1);border-color:var(--bdr);color:var(--tx)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,17,23,.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100;min-height:64px}
.nb{flex:1;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--font-mono);font-size:8px;font-weight:400;letter-spacing:1.5px;color:var(--m2);position:relative;text-transform:uppercase;cursor:pointer;background:none;border:none}
.nb.on{color:var(--acc)}
.nbi{font-size:19px;line-height:1}
.nbd{position:absolute;top:5px;right:calc(50% - 16px);background:var(--red);color:#fff;font-family:var(--font-mono);font-size:8px;font-weight:400;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.card{background:var(--c1);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;margin-bottom:8px}
.card-p{padding:16px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.scard{background:var(--c1);border:1px solid var(--bdr);border-radius:16px;padding:16px;cursor:pointer;transition:border-color .15s}
.scard:active{border-color:var(--acc)}
.sv{font-family:var(--font-display);font-size:36px;line-height:1;margin-bottom:3px;letter-spacing:2px}
.sl{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--m1)}
.ss{font-family:var(--font-mono);font-size:9px;color:var(--m2);margin-top:2px;letter-spacing:1px}
.lbl{font-family:var(--font-mono);font-size:9px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--m1);margin-bottom:6px}
.inp{width:100%;background:var(--c1);border:1px solid var(--bdr);border-radius:12px;color:var(--tx);font-family:var(--font-body);font-size:15px;font-weight:400;padding:14px 16px;transition:border-color .15s,box-shadow .15s;display:block}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--cobalt-glow)}
.inp::placeholder{color:var(--m2)}
.sel{width:100%;background:var(--c1);border:1px solid var(--bdr);border-radius:12px;color:var(--tx);font-family:var(--font-body);font-size:14px;padding:13px 16px;display:block;transition:border-color .15s}
.sel:focus{border-color:var(--acc)}
.row{margin-bottom:14px}
.btn{display:block;width:100%;padding:15px;border-radius:14px;font-family:var(--font-mono);font-size:12px;font-weight:400;letter-spacing:4px;text-transform:uppercase;color:#fff;text-align:center;cursor:pointer;border:none;margin-bottom:8px;transition:all .15s;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.10),transparent 55%);pointer-events:none}
.btn-acc{background:var(--acc);box-shadow:var(--shadow-cobalt)}
.btn-acc:active{background:var(--acc-d);box-shadow:none}
.btn-green{background:#16A34A;box-shadow:0 8px 24px rgba(22,163,74,0.35)}
.btn-ghost{background:transparent;border:1px solid var(--bdr);color:var(--m1);box-shadow:none}
.btn-ghost::after{display:none}
.btn-ghost:active{border-color:var(--m1);color:var(--tx)}
.btn-red{background:var(--red);box-shadow:0 8px 24px rgba(220,38,38,0.35)}
.btn-pink{background:#9333EA;box-shadow:0 8px 24px rgba(147,51,234,0.35)}
.btn-sm{padding:7px 14px;font-family:var(--font-mono);font-size:10px;font-weight:400;letter-spacing:2px;text-transform:uppercase;border-radius:8px;border:none;cursor:pointer;color:#fff;transition:all .15s}
.pill{padding:3px 9px;border-radius:999px;font-family:var(--font-mono);font-size:9px;font-weight:400;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;border:1px solid transparent}
.p-green{background:rgba(22,163,74,.12);border-color:rgba(22,163,74,.25);color:#4ADE80}
.p-amber{background:rgba(217,119,6,.12);border-color:rgba(217,119,6,.25);color:#FCD34D}
.p-red{background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.25);color:#FCA5A5}
.p-blue{background:rgba(37,99,235,.12);border-color:rgba(37,99,235,.25);color:var(--acc-l)}
.p-pink{background:rgba(236,72,153,.12);border-color:rgba(236,72,153,.25);color:#F9A8D4}
.p-gray{background:rgba(107,127,163,.1);border-color:var(--bdr);color:var(--m1)}
.alert{padding:12px 14px;border-radius:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
.alert-red{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2)}
.alert-amber{background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.2)}
.ccard{background:var(--c1);border:1px solid var(--bdr);border-radius:16px;padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.ccard:active{border-color:var(--acc)}
.cname{font-size:16px;font-weight:600;color:var(--tx);margin-bottom:4px}
.cmeta{font-family:var(--font-mono);font-size:10px;color:var(--m1);display:flex;gap:8px;flex-wrap:wrap;align-items:center;letter-spacing:1px}
.ex-card{background:var(--c1);border:1px solid var(--bdr);border-radius:16px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.ex-card.done{background:rgba(22,163,74,.04);border-color:rgba(22,163,74,.2)}
.ex-hdr{padding:13px 15px;cursor:pointer}
.ex-name{font-weight:600;font-size:14px;color:var(--tx);margin-bottom:3px}
.ex-card.done .ex-name{color:var(--m2);text-decoration:line-through}
.ex-info{font-family:var(--font-mono);font-size:10px;color:var(--m1);letter-spacing:1px}
.ex-cue{font-size:12px;color:var(--m1);line-height:1.7;padding:0 15px 12px;display:none}
.ex-cue.show{display:block}
.sets{display:flex;gap:6px;padding:0 15px 13px;flex-wrap:wrap}
.sdot{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:400;color:var(--m2);cursor:pointer;transition:all .15s;flex-direction:column;gap:1px}
.sdot.done{color:#fff}
.sdot.active{border-style:dashed;border-color:var(--acc)}
.sdot-w{font-size:8px;font-weight:400;font-family:var(--font-mono)}
.lpanel{padding:13px 15px 15px;background:rgba(13,17,23,.8);border-top:1px solid var(--bdr)}
.lt{font-family:var(--font-mono);font-size:10px;font-weight:400;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;color:var(--m1)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.prev{font-family:var(--font-mono);font-size:10px;color:var(--m2);padding:7px 11px;background:rgba(13,17,23,.8);border-radius:8px;border:1px solid var(--bdr);margin-bottom:8px;letter-spacing:.5px}
.rpe-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.rpe-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--bdr);background:var(--c2);font-family:var(--font-mono);font-size:10px;font-weight:400;color:var(--m1);cursor:pointer;transition:all .15s}
.rpe-btn.on{background:var(--acc);border-color:var(--acc);color:#fff}
.log-acts{display:flex;gap:6px}
.sect{font-family:var(--font-mono);font-size:9px;font-weight:400;letter-spacing:3.5px;text-transform:uppercase;color:var(--m2);margin:18px 0 10px}
.sect:first-child{margin-top:0}
.empty{text-align:center;padding:40px 20px;color:var(--m2);font-size:13px;line-height:1.6}
.si{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--bdr)}
.si:last-child{border-bottom:none}
.si-time{min-width:50px;text-align:center}
.si-th{font-family:var(--font-mono);font-size:13px;font-weight:400;color:var(--tx)}
.si-td{font-family:var(--font-mono);font-size:10px;color:var(--m1);margin-top:2px;letter-spacing:.5px}
.si-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.si-info{flex:1}
.si-name{font-size:14px;font-weight:500;color:var(--tx)}
.si-meta{font-family:var(--font-mono);font-size:10px;color:var(--m1);margin-top:2px;letter-spacing:.5px}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr)}
.pay-row:last-child{border-bottom:none}
.pay-amt{font-family:var(--font-display);font-size:22px;color:var(--green);letter-spacing:1px}
.pay-info{font-family:var(--font-mono);font-size:10px;color:var(--m1);margin-top:2px;letter-spacing:.5px}
.pr-brow{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.pr-bg{flex:1;height:6px;background:var(--bdr);border-radius:3px;overflow:hidden}
.pr-fill{height:100%;border-radius:3px;transition:width .4s}
.pr-val{font-family:var(--font-mono);font-size:10px;color:var(--m1);min-width:50px;text-align:right}
.pr-tag{font-family:var(--font-mono);font-size:8px;padding:1px 6px;border-radius:999px;background:rgba(217,119,6,.15);color:var(--amber);font-weight:400;margin-left:4px;border:1px solid rgba(217,119,6,.2);letter-spacing:1px}
.sk-card{background:linear-gradient(135deg,rgba(217,119,6,.08),rgba(220,38,38,.05));border:1px solid rgba(217,119,6,.2);border-radius:16px;padding:16px;margin-bottom:14px}
.sk-nums{display:flex;gap:24px;margin-bottom:12px}
.sk-n{font-family:var(--font-display);font-size:48px;color:var(--amber);line-height:1;letter-spacing:2px}
.sk-l{font-family:var(--font-mono);font-size:9px;color:var(--m1);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.sk-days{display:flex;gap:4px;flex-wrap:wrap}
.sk-day{width:33px;height:33px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-family:var(--font-mono);font-size:8px}
.sk-day.done{background:rgba(217,119,6,.2);border:1px solid rgba(217,119,6,.35)}
.sk-day.today{background:rgba(217,119,6,.35);border:1.5px solid var(--amber)}
.sk-day.miss{background:var(--c2);border:1px solid var(--bdr)}
.chat-wrap{max-height:52vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 0}
.chat-msg{max-width:80%;display:flex;flex-direction:column}
.from-me{align-self:flex-end}
.from-them{align-self:flex-start}
.bubble{padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.6;font-weight:400}
.from-me .bubble{background:var(--acc);color:#fff;border-bottom-right-radius:3px}
.from-them .bubble{background:var(--c2);color:var(--tx);border-bottom-left-radius:3px;border:1px solid var(--bdr)}
.chat-ts{font-family:var(--font-mono);font-size:9px;color:var(--m2);margin-top:3px;letter-spacing:.5px}
.from-me .chat-ts{align-self:flex-end}
.from-them .chat-ts{align-self:flex-start}
.chat-bar{display:flex;gap:8px;align-items:flex-end;padding-top:10px;border-top:1px solid var(--bdr);margin-top:8px}
.chat-ta{flex:1;background:var(--c1);border:1px solid var(--bdr);border-radius:12px;color:var(--tx);font-family:var(--font-body);font-size:13px;padding:10px 13px;min-height:42px;max-height:100px;line-height:1.5}
.chat-ta:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--cobalt-glow)}
.chat-send{width:42px;height:42px;border-radius:12px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0;cursor:pointer;border:none;box-shadow:var(--shadow-cobalt)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end}
.modal-box{background:var(--c2);border-radius:20px 20px 0 0;padding:22px 20px;width:100%;max-height:92vh;overflow-y:auto;border-top:1px solid var(--bdr)}
.modal-title{font-size:18px;font-weight:600;color:var(--tx);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.toast-bar{position:fixed;top:0;left:0;right:0;z-index:999;padding:10px 16px;font-family:var(--font-mono);font-size:10px;font-weight:400;letter-spacing:2px;text-transform:uppercase;text-align:center;display:none}
.t-ok{background:rgba(22,163,74,.95);color:#fff}
.t-err{background:rgba(220,38,38,.95);color:#fff}
.t-info{background:rgba(37,99,235,.95);color:#fff}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.login-box{width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:32px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.role-card{padding:18px 16px;border-radius:14px;border:1.5px solid var(--bdr);background:var(--c1);cursor:pointer;text-align:center;transition:all .15s}
.role-card.on{border-color:var(--acc);background:rgba(37,99,235,.08);box-shadow:0 0 0 3px var(--cobalt-glow)}
.err-msg{font-family:var(--font-mono);font-size:10px;letter-spacing:.5px;color:#FCA5A5;padding:10px 13px;background:rgba(220,38,38,.08);border-radius:10px;margin-bottom:10px;border:1px solid rgba(220,38,38,.15)}
.ok-msg{font-family:var(--font-mono);font-size:10px;letter-spacing:.5px;color:#4ADE80;padding:10px 13px;background:rgba(22,163,74,.08);border-radius:10px;margin-bottom:10px;border:1px solid rgba(22,163,74,.15)}
.wk-banner{padding:10px 14px;border-left:3px solid var(--acc);background:rgba(37,99,235,.05);border-radius:0 10px 10px 0;margin-bottom:12px}
.alt-wrap{padding:11px 15px 13px;background:rgba(217,119,6,.04);border-top:1px solid rgba(217,119,6,.12)}
.alt-btn{display:block;width:100%;text-align:left;padding:9px 12px;background:var(--c2);border:1px solid var(--bdr);border-radius:10px;color:var(--tx);font-size:12px;font-weight:500;margin-bottom:5px;cursor:pointer;transition:border-color .15s}
.alt-btn:active{border-color:var(--acc)}
.big-bal{text-align:center;padding:24px 16px;background:linear-gradient(135deg,rgba(22,163,74,.1),rgba(37,99,235,.05));border:1px solid rgba(22,163,74,.2);border-radius:16px;margin-bottom:14px}

#rest-banner{position:fixed;left:0;right:0;bottom:calc(64px + env(safe-area-inset-bottom));z-index:95;padding:12px 16px;text-align:center;font-family:'DM Mono',monospace;font-size:12px;font-weight:400;letter-spacing:3px;text-transform:uppercase;display:none;cursor:pointer;transition:background .4s,color .4s}
.rb-green{background:#15803D;color:#fff}
.rb-amber{background:#B45309;color:#fff}
.rb-red{background:#B91C1C;color:#fff}
@keyframes rbpulse{0%,100%{opacity:1}50%{opacity:.4}}
.rb-pulse{animation:rbpulse .9s infinite}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;display:flex;animation:fadeIn .15s}
.sidebar{width:225px;background:var(--c1);height:100%;border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow-y:auto;animation:slideIn .18s}
.sbr-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;color:var(--m1);font-size:13px;font-weight:500;border-radius:10px;margin:2px 8px;transition:all .12s}
.sbr-item.on{background:rgba(37,99,235,.12);color:var(--acc-l)}
.sbr-item:active{opacity:.75}
.tr-topbar{position:sticky;top:0;z-index:90;background:rgba(6,8,16,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.dash-section{padding:2px 0}
input[type=range]{-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;background:var(--bdr);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 2px 8px rgba(37,99,235,.4)}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--acc);cursor:pointer;border:none;box-shadow:0 2px 8px rgba(37,99,235,.4)}
input[type=range].blue{background:linear-gradient(to right,var(--blue) 0%,var(--blue) 50%,var(--bdr) 50%)}
input[type=range].red-r{background:linear-gradient(to right,var(--red) 0%,var(--red) 50%,var(--bdr) 50%)}
input[type=range].amber{background:linear-gradient(to right,var(--amber) 0%,var(--amber) 50%,var(--bdr) 50%)}
input[type=range].green-r{background:linear-gradient(to right,var(--green) 0%,var(--green) 50%,var(--bdr) 50%)}
</style>
</head>
<body>
<div id="toast" class="toast-bar"></div>
<div id="rest-banner" onclick="dismissRest()"></div>
<div id="modal"></div>
<div id="app">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:#07070e;padding:20px;text-align:center">
