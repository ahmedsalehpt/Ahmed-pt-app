try { localStorage.setItem('_last_trainer_code', invite); } catch(e) {}

if (trId) {
DB._prefix = trId+'_'; DB._fbPath = 'trainers/'+trId; S.trId = trId;
_doSignupInNamespace(name, pin, invite, errEl);
} else {
_tryLegacySignup(name, pin, invite, errEl);
}
}).catch(function(){ _tryLegacySignup(name, pin, invite, errEl); });
} else {
_tryLegacySignup(name, pin, invite, errEl);
}
}
function _tryLegacySignup(name, pin, invite, errEl) {
var tdata = localStorage.getItem('trainer'); tdata = tdata ? JSON.parse(tdata) : {};
var tCode = (tdata.inviteCode||(tdata.name||'').toLowerCase().replace(/[^a-z0-9]/g,'')).toLowerCase();
if (!tCode || invite !== tCode) {
if(errEl) errEl.innerHTML='<div class="err-msg">Invalid invite code. Ask your trainer for their code.</div>'; return;
}
_doSignupInNamespace(name, pin, invite, errEl);
}
function _doSignupInNamespace(name, pin, invite, errEl) {
var nameLower = name.toLowerCase();
var pfx = DB._prefix;
var existing = Object.keys(localStorage).filter(function(k){return k.startsWith(pfx+'cp_');});
for (var i = 0; i < existing.length; i++) {
var raw = localStorage.getItem(existing[i]); if(!raw)continue;
var ec = JSON.parse(raw);
if (ec && ec.name && ec.name.toLowerCase() === nameLower) {
if(errEl) errEl.innerHTML='<div class="err-msg">Name already registered. Please log in instead.</div>'; return;
}
}
var cid = 'c' + Date.now();
DB.set('cp_'+cid, {name:name, pin:pin, balance:0, type:'in_person', joined:today()});
var tc = DB.get('tc') || {};
tc[cid] = {name:name, type:'in_person', balance:0, rate:0, joined:today(), lastActive:today()};
DB.set('tc', tc);
S.clients = tc;
enterClient(cid);
toast('Welcome '+name+'! Your trainer has been notified.', 'ok');
}

function _ensureFirebaseReady(errEl) {
if (!window.firebase) { if(errEl)errEl.innerHTML='<div class="err-msg">Firebase SDK not loaded. Check your internet connection and reload.</div>'; return false; }
if (!firebase.apps || !firebase.apps.length) {
try { firebase.initializeApp(FB_CONFIG); DB._fb = firebase.database(); } catch(e) {}
}
if (!firebase.auth) { if(errEl)errEl.innerHTML='<div class="err-msg">Firebase Auth not loaded. Reload the page and try again.</div>'; return false; }
return true;
}
function _fbAuthErrMsg(e) {
if (e.code === 'auth/configuration-not-found') return 'Email/Password sign-in is not enabled. Go to Firebase Console &rarr; Authentication &rarr; Sign-in methods and enable Email/Password.';
if (e.code === 'auth/email-already-in-use') return 'This email already has an account. Sign in instead.';
if (e.code === 'auth/user-not-found') return 'No account found with that email.';
if (e.code === 'auth/wrong-password') return 'Incorrect password.';
if (e.code === 'auth/invalid-email') return 'Invalid email address.';
if (e.code === 'auth/too-many-requests') return 'Too many attempts. Try again later.';
return e.message || 'Authentication failed.';
}

function _setupTrainerSession(uid, name, email, currency, refCode) {
DB._prefix = uid+'_'; DB._fbPath = 'trainers/'+uid; S.trId = uid;
// Reuse legacy invite code so existing clients still work
var legacyT = null;
try { var _lt = localStorage.getItem('trainer'); legacyT = _lt ? JSON.parse(_lt) : null; } catch(e) {}
var inviteCode = (legacyT && legacyT.inviteCode) ? legacyT.inviteCode : _genInviteCode(name);
var tdata = {name:name, email:email, uid:uid, currency:currency, inviteCode:inviteCode, joined:today()};
DB.set('trainer', tdata);
if (DB._fb) DB._fb.ref('trainer_codes/'+inviteCode).set(uid).catch(function(){});
DB.set('sess', {role:'trainer', trId:uid});
// Migrate any existing unscoped (legacy) data into this account's namespace
var migrated = _migrateLegacyData(uid);
_enterTrainerWithId(uid);
setTimeout(function(){ setupReferral(uid, name, refCode||null); }, 1000);
if (migrated > 0) {
toast('Account created + ' + migrated + ' legacy records migrated!', 'ok');
} else {
toast('Account created! Share invite code: '+inviteCode, 'ok');
}
}
function _migrateLegacyData(newUid) {
// Copy all unscoped legacy localStorage keys into {newUid}_ namespace
var SKIP = ['trainer','sess','_last_trainer_code'];
var KNOWN = ['tc','sub','referral_code'];
var KNOWN_PFX = ['cp_','logs_','progs_','sessions_','habits_','goals_','nots_','msgs_','sub_'];
var all = Object.keys(localStorage);
var count = 0;
for (var i=0; i<all.length; i++) {
var k = all[i];
if (SKIP.indexOf(k) >= 0) continue;
var isLegacy = KNOWN.indexOf(k) >= 0;
if (!isLegacy) {
for (var j=0; j<KNOWN_PFX.length; j++) {
if (k.indexOf(KNOWN_PFX[j]) === 0) { isLegacy = true; break; }
}
}
if (!isLegacy) continue;
var newKey = newUid+'_'+k;
if (localStorage.getItem(newKey) !== null) continue; // don't overwrite
var val = localStorage.getItem(k);
if (val === null) continue;
localStorage.setItem(newKey, val);
count++;
}
return count;
}
function _genInviteCode(name) {
var pre = (name||'PT').replace(/[^a-zA-Z]/g,'').toUpperCase().substring(0,4)||'PT';
return pre+(Math.floor(Math.random()*9000+1000)).toString();
}

function doCLogin() {
var name = ((document.getElementById('cname')||{}).value||'').trim().toLowerCase();
var pass = ((document.getElementById('cpin')||{}).value||'').trim();
var errEl = document.getElementById('clogin_err');
function showErr(m){if(errEl)errEl.innerHTML='<div class="err-msg">'+m+'</div>';}
if (!name) { showErr('Enter your name'); return; }
if (!pass) { showErr('Enter your password'); return; }
// Search every localStorage key across all trainer namespaces
var allKeys = Object.keys(localStorage);
var matchCid = null;
var matchPrefix = null;
var matchFbPath = null;
for (var i=0; i<allKeys.length; i++) {
var k = allKeys[i];
var cpIdx = k.indexOf('cp_');
if (cpIdx < 0) continue;
var raw = localStorage.getItem(k); if(!raw) continue;
var c; try { c = JSON.parse(raw); } catch(e){ continue; }
if (c && c.name && c.name.toLowerCase() === name && c.pin === pass) {
matchCid = k.substring(cpIdx+3);
matchPrefix = k.substring(0, cpIdx);
// Determine fbPath from prefix
if (matchPrefix === '') {
matchFbPath = 'ahmedpt';
} else {
// prefix is "{uid}_"
var uid = matchPrefix.replace(/_$/,'');
matchFbPath = 'trainers/'+uid;
}
break;
}
}
if (!matchCid) { showErr('Name or password not found. Ask your trainer if you need a new account.'); return; }
DB._prefix = matchPrefix;
DB._fbPath = matchFbPath;
if (matchPrefix !== '') {
S.trId = matchPrefix.replace(/_$/,'');
}
enterClient(matchCid);
}

S.logs=DB.get('logs_'+cid)||{};
S.exN=DB.get('exnotes_'+cid)||{};
S.sN=DB.get('sessnotes_'+cid)||{};
S.msgs=DB.get('msgs_'+cid)||[];

S.prs=DB.get('prs_'+cid)||{};

DB.set('sess', {role:'client', cid:cid, trId:S.trId||null});
loadClientPremium(cid);
setupMsgListener(cid, 'client');
R();

function setupMsgListener(cid, role) {
teardownMsgListener();
if (!DB._fb) return;
var ref = DB._fb.ref(DB._fbPath+'/msgs_' + cid);
S._msgListenerCid = cid;
S._msgListenerRef = ref;
S._msgListenerFn = function(snap) {
var msgs = snap.val() || [];
if (!Array.isArray(msgs)) msgs = [];
try { localStorage.setItem('msgs_' + cid, JSON.stringify(msgs)); } catch(e) {}
if (role === 'client' && S.cid === cid) {
var prevLen = S.msgs.length;
S.msgs = msgs;
S.unread = msgs.filter(function(m){ return m.from === 'trainer' && !m.read; }).length;
if (msgs.length !== prevLen) { R(); }
} else if (role === 'trainer') {
var prevTrainerLen = ((S.cliData[cid] || {}).messages || []).length;
if (!S.cliData[cid]) S.cliData[cid] = {};
S.cliData[cid].messages = msgs;
if (msgs.length !== prevTrainerLen && S.vCli === cid && S.cliTab === 'chat') { R(); }
}
};
ref.on('value', S._msgListenerFn);
}
function teardownMsgListener() {
if (S._msgListenerRef && S._msgListenerFn) {
try { S._msgListenerRef.off('value', S._msgListenerFn); } catch(e) {}
}
S._msgListenerRef = null; S._msgListenerFn = null; S._msgListenerCid = null;
}

function getUpcoming() {
var all = [];
Object.keys(S.clients).forEach(function(cid) {
var c = S.clients[cid];
Object.values(c.sessions||{}).forEach(function(s){
if (s.status==='upcoming') {
var item = {clientId:cid, clientName:c.name, clientType:c.type||'inperson'};
Object.keys(s).forEach(function(k){ item[k]=s[k]; });
all.push(item);
}
});
});
return all.sort(function(a,b){ return ((a.date||'')+(a.time||'')).localeCompare((b.date||'')+(b.time||'')); });
}
function monthStats() {
var now = new Date();
var mn = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
var rev = 0, sessDone = 0, needPay = 0, alerts = [];
Object.keys(S.clients).forEach(function(cid) {
var c = S.clients[cid];
Object.values(c.payments||{}).forEach(function(p){ if(p.date&&p.date.startsWith(mn)) rev+=p.amount||0; });
Object.values(c.sessions||{}).forEach(function(s){ if(s.status==='done'&&s.doneAt&&new Date(s.doneAt).toISOString().startsWith(mn)) sessDone++; });
var bal = c.balance||0;
if (bal===0) { needPay++; alerts.push({cid:cid,name:c.name,type:'zero',msg:'No sessions left - needs payment'}); }
else if (bal<=2) alerts.push({cid:cid,name:c.name,type:'low',msg:'Only '+bal+' session'+(bal===1?'':'s')+' remaining'});
});
return {rev:rev, sessDone:sessDone, needPay:needPay, alerts:alerts};
}

function getCurrentMonthKey() {
var n = new Date();
return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0');
}

function getMonthsSinceJoining() {
var now = new Date();
var months = [];
var d = new Date(now.getFullYear(), now.getMonth() - 5, 1);
while (d <= now) {
var key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
var label = d.toLocaleDateString('en-GB', {month:'short', year:'2-digit'});
months.push({key:key, label:label});
d.setMonth(d.getMonth() + 1);
}
return months.reverse();
}

function getIncomeStats(monthKey) {
var payments = [];
var total = 0, outstanding = 0, newClients = 0;
Object.keys(S.clients).forEach(function(cid) {
var c = S.clients[cid];
Object.values(c.payments || {}).forEach(function(p) {
if (p.date && p.date.startsWith(monthKey)) {
var row = {clientName:c.name, date:p.date, amount:p.amount||0, sessions:p.sessions||0, ts:p.ts||0};
payments.push(row);
total += p.amount || 0;
}
});
var bal = c.balance||0; if (bal < 0 && c.type !== 'online') outstanding += Math.abs(bal) * (c.rate||0);
});
payments.sort(function(a,b){ return (b.ts||0) - (a.ts||0); });
var ms = monthStats();
return {total:total, outstanding:outstanding, newClients:newClients, payments:payments, sessionsDone:ms.sessDone};
}

function getTimeAgo(ts) {
if (!ts) return '';
var diff = Date.now() - ts;
var mins = Math.floor(diff / 60000);
if (mins < 60) return mins + 'm ago';
var hrs = Math.floor(diff / 3600000);
if (hrs < 24) return hrs + 'h ago';
return Math.floor(diff / 86400000) + 'd ago';
}

function getAllSessions() {
var all = [];
Object.keys(S.clients).forEach(function(cid) {
var c = S.clients[cid];
Object.values(c.sessions||{}).forEach(function(s) {
var item = {clientId:cid, clientName:c.name, clientType:c.type||'inperson'};
Object.keys(s).forEach(function(k){ item[k]=s[k]; });
all.push(item);
});
});
return all;
}

function renderDateNav() {

function changeSchedDate(delta) {
var d = new Date(S.schedDate + 'T12:00:00');
d.setDate(d.getDate() + delta);
S.schedDate = d.toISOString().split('T')[0];
R();
}

function changeSchedMonth(delta) {
var d = new Date(S.schedDate + 'T12:00:00');
d.setMonth(d.getMonth() + delta);
d.setDate(1);
S.schedDate = d.toISOString().split('T')[0];
R();
}

allSess.sort(function(a,b){ return (a.time||'').localeCompare(b.time||''); });
var hours = [];
for (var h = 6; h <= 21; h++) hours.push(h);
return renderDateNav() +
'<div style="position:relative">' +
hours.map(function(h) {

function renderWeekView() {
var d = new Date(S.schedDate + 'T12:00:00');
var dow = d.getDay();
var mon = new Date(d); mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
var days = [];
for (var i = 0; i < 7; i++) {
var day = new Date(mon); day.setDate(mon.getDate() + i);
days.push(day.toISOString().split('T')[0]);
}
var allSess = getAllSessions();
var monD = new Date(days[0]+'T12:00:00');
var sunD = new Date(days[6]+'T12:00:00');
return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
'<button onclick="changeSchedDate(-7)" style="background:var(--c2);border:1px solid var(--bdr);border-radius:8px;padding:6px 12px;color:var(--tx);cursor:pointer">&#8249;</button>' +
'<div style="font-size:13px;font-weight:700;color:#fff">' + monD.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + ' &ndash; ' + sunD.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + '</div>' +
'<button onclick="changeSchedDate(7)" style="background:var(--c2);border:1px solid var(--bdr);border-radius:8px;padding:6px 12px;color:var(--tx);cursor:pointer">&#8250;</button>' +
'</div>' +
'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px">' +
days.map(function(dateStr) {
var isToday = dateStr === today();

var daySess = allSess.filter(function(s){ return s.date === dateStr; });
var d2 = new Date(dateStr + 'T12:00:00');
return '<div onclick="setSchedDay(this)" data-date="' + dateStr + '"" style="background:' + (isSelected?'var(--acc)':isToday?'rgba(99,102,241,.1)':'var(--c2)') + ';border:1px solid ' + (isToday?'var(--acc)':'var(--bdr)') + ';border-radius:10px;padding:7px 4px;text-align:center;cursor:pointer;min-height:64px">' +
'<div style="font-size:9px;color:' + (isSelected?'rgba(255,255,255,.7)':'var(--m2)') + '">' + ['Su','Mo','Tu','We','Th','Fr','Sa'][d2.getDay()] + '</div>' +
'<div style="font-size:15px;font-weight:800;color:#fff;margin:3px 0">' + d2.getDate() + '</div>' +
daySess.slice(0,3).map(function(s) {
return '<div style="height:4px;border-radius:2px;background:' + (s.clientType==='online'?'var(--blue)':'var(--green)') + ';margin:1px 2px"></div>';
}).join('') +
(daySess.length > 3 ? '<div style="font-size:8px;color:' + (isSelected?'rgba(255,255,255,.6)':'var(--m2)') + '">+' + (daySess.length-3) + '</div>' : '') +
'</div>';
}).join('') + '</div>' +
'<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:var(--m2);margin-bottom:8px">' + fmtD(S.schedDate).toUpperCase() + '</div>' +
renderDaySessionList(S.schedDate);
}

function renderDaySessionList(dateStr) {
var sessions = getAllSessions().filter(function(s){ return s.date === dateStr; });
sessions.sort(function(a,b){ return (a.time||'').localeCompare(b.time||''); });
if (sessions.length === 0) return '<div style="font-size:12px;color:var(--m2);padding:12px 0">No sessions this day.</div>';
return '<div class="card"><div class="card-p">' + sessions.map(function(s){ return sessRow(s); }).join('') + '</div></div>';
}

function renderMonthView() {
var d = new Date(S.schedDate + 'T12:00:00');
var year = d.getFullYear(), month = d.getMonth();
var firstDay = new Date(year, month, 1);
var lastDay = new Date(year, month + 1, 0);
var allSess = getAllSessions();
var startDow = firstDay.getDay();
var cells = [];
for (var i = 0; i < startDow; i++) cells.push(null);
for (var day = 1; day <= lastDay.getDate(); day++) cells.push(day);
while (cells.length % 7 !== 0) cells.push(null);
return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
'<button onclick="changeSchedMonth(-1)" style="background:var(--c2);border:1px solid var(--bdr);border-radius:8px;padding:5px 12px;color:var(--tx);cursor:pointer">&#8249;</button>' +
'<div style="font-size:14px;font-weight:700;color:#fff">' + d.toLocaleDateString('en-GB',{month:'long',year:'numeric'}) + '</div>' +
'<button onclick="changeSchedMonth(1)" style="background:var(--c2);border:1px solid var(--bdr);border-radius:8px;padding:5px 12px;color:var(--tx);cursor:pointer">&#8250;</button>' +
'</div>' +
'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">' +
['Su','Mo','Tu','We','Th','Fr','Sa'].map(function(l){ return '<div style="text-align:center;font-size:9px;color:var(--m2);font-weight:700;padding:4px">' + l + '</div>'; }).join('') + '</div>' +
'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">' +
cells.map(function(day) {
if (!day) return '<div></div>';
var dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
var isToday = dateStr === today();
var daySess = allSess.filter(function(s){ return s.date === dateStr; });
return '<div onclick="setSchedDay(this)" data-date="' + dateStr + '"" style="background:' + (isToday?'rgba(99,102,241,.15)':'var(--c2)') + ';border:1px solid ' + (isToday?'var(--acc)':'var(--bdr)') + ';border-radius:8px;padding:5px;text-align:center;min-height:42px;cursor:pointer">' +
'<div style="font-size:12px;font-weight:700;color:' + (isToday?'var(--acc)':'#fff') + '">' + day + '</div>' +
daySess.slice(0,2).map(function(s) {
return '<div style="height:3px;border-radius:2px;background:' + (s.clientType==='online'?'var(--blue)':'var(--green)') + ';margin-top:2px"></div>';
}).join('') + '</div>';
}).join('') + '</div>';
}

function saveInviteCode() {
var code = ((document.getElementById('new_invite_code')||{}).value||'').trim().toLowerCase().replace(/[^a-z0-9]/g,'');
if (!code) { toast('Enter a valid code','err'); return; }
var tdata = DB.get('trainer') || {};
var oldCode = tdata.inviteCode;
tdata.inviteCode = code;
DB.set('trainer', tdata);
if (DB._fb && S.trId) {
DB._fb.ref('trainer_codes/'+code).set(S.trId).catch(function(){});
if (oldCode && oldCode !== code) DB._fb.ref('trainer_codes/'+oldCode).remove().catch(function(){});
}
toast('Invite code updated: ' + code, 'ok');
R();
}
function saveTrainerCurrency() {
var cur = ((document.getElementById('tr_currency')||{}).value)||'GBP';
var tdata = DB.get('trainer') || {};
tdata.currency = cur;
DB.set('trainer', tdata);
toast('Currency set to '+cur+' '+currencySymbol(cur), 'ok');
R();
}
function saveApiKey() {
var key = ((document.getElementById('anthropic_key_input')||{}).value||'').trim();
if (!key) { toast('Enter an API key','err'); return; }
DB.set('anthropic_key', key);
toast('API key saved','ok');
R();
}
function renderPendingSignups() {
var pending = [];
Object.keys(localStorage).forEach(function(k) {
if (k.startsWith('pending_signup_')) {
try { var v = JSON.parse(localStorage.getItem(k)); if(v) pending.push({key:k, data:v}); } catch(e) {}
}
});
if (pending.length === 0) return '<div style="font-size:12px;color:var(--m2)">No pending signups.</div>';
return pending.map(function(p) {
return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)">' +
'<div style="flex:1"><div style="font-size:13px;font-weight:600;color:#fff">' + p.data.name + '</div>' +

function doAddClient() {
if (!canAddClient()) { showUpgradeModal('clientLimit'); return; }
var name = ((document.getElementById('nc_n')||{}).value||'').trim();
var type = (document.getElementById('nc_t')||{}).value||'inperson';
var curr = (document.getElementById('nc_c')||{}).value||'GBP';
var rate = parseFloat((document.getElementById('nc_r')||{}).value||'0')||0;
var pin = ((document.getElementById('nc_p')||{}).value||'').trim();
var goal = (document.getElementById('nc_goal')||{}).value||'';
var exp = (document.getElementById('nc_exp')||{}).value||'beginner';
var bw = parseFloat((document.getElementById('nc_bw')||{}).value||'0')||0;
var tw = parseFloat((document.getElementById('nc_tw')||{}).value||'0')||0;
var inj = ((document.getElementById('nc_inj')||{}).value||'').trim();
var err = document.getElementById('nc_err');
if (!name) { if(err) err.innerHTML='<div class="err-msg">Enter client name</div>'; return; }
if (pin.length<4) { if(err) err.innerHTML='<div class="err-msg">PIN must be 4 digits</div>'; return; }
var cid = name.toLowerCase().replace(/[^a-z0-9]/g,'*') + '*' + Date.now();
var intake = {goal:goal, experience:exp, bodyWeight:bw||null, targetWeight:tw||null, injuries:inj||null, addedAt:Date.now()};
var data = {name:name, type:type, currency:curr, rate:rate, pin:pin, unit:'kg', week:1, currentProgId:null, intake:intake};
DB.set('cp_'+cid, data);
S.clients[cid] = {name:name, type:type, currency:curr, rate:rate, balance:0, streak:{cur:0}, msgCount:0, sessions:{}, payments:{}};
DB.set('tc', S.clients);
DB.set('sessions_'+cid, {});
DB.set('payments_'+cid, {});
DB.set('msgs_'+cid, []);
closeModal();
toast(name+' added! PIN: '+pin, 'ok');
setTimeout(function(){ openAddProg(cid); }, 400);
R();
}

function buildSessLog(logs, cid) {
var sess = {}, progs = getProgs(cid), cp = getProg(cid);
Object.keys(logs).forEach(function(key) {
var l = logs[key]; if (!l||!l.done) return;
var p = key.split('_');
var w=parseInt(p[0].replace('w','')),d=parseInt(p[1].replace('d','')),ei=parseInt(p[2].replace('e','')),si=parseInt(p[3].replace('s',''));
var k2='w'+w+'_d'+d;
var day = cp && cp.days ? cp.days[d] : null;
if (!sess[k2]) sess[k2]={w:w,d:d,day:day,exLogs:{},sk:k2,ts:l.ts||0};
if (!sess[k2].exLogs[ei]) sess[k2].exLogs[ei]={ex:day&&day.ex?day.ex[ei]:null,sets:{}};
sess[k2].exLogs[ei].sets[si]=l;
if((l.ts||0)>sess[k2].ts)sess[k2].ts=l.ts;
});
return Object.values(sess).sort(function(a,b){return b.ts-a.ts;});
}

function buildProgData(logs, cid) {
var ex={}, progs=getProgs(cid);
Object.keys(logs).forEach(function(key){
var l=logs[key]; if(!l||!l.done||!l.weight)return;
var p=key.split('_');
var w=parseInt(p[0].replace('w','')),d=parseInt(p[1].replace('d','')),ei=parseInt(p[2].replace('e',''));
var exName=l.exName;
if(!exName){for(var pi=0;pi<progs.length;pi++){var pr=progs[pi];if(pr.days&&pr.days[d]&&pr.days[d].ex&&pr.days[d].ex[ei]){exName=pr.days[d].ex[ei].n;break;}}}
if(!exName)return;
var k=exName.replace(/[^a-zA-Z0-9]/g,'_');
if(!ex[k])ex[k]={name:exName,bw:{}};
var wt=parseFloat(l.weight)||0;
if(!ex[k].bw[w]||wt>ex[k].bw[w])ex[k].bw[w]=wt;
});
return Object.values(ex).filter(function(e){return Object.keys(e.bw).length>0;});
}

function _getBsWorkoutOpts(cid) {
var prog=getProg(cid);
if(!prog||!prog.days||!prog.days.length)return '<option value="">&#8212; No program assigned &#8212;</option>';
var WD_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var opts='<option value="">&#8212; Auto-detect / None &#8212;</option>';
for(var di=0;di<prog.days.length;di++){
var d=prog.days[di];
var wdStr=(d.weekdays||[]).map(function(w){return WD_NAMES[w];}).join(', ');
opts+='<option value="'+di+'">'+(d.title||d.tag||'Workout '+(di+1))+(wdStr?' ('+wdStr+')':'')+' &#8212; '+(d.ex?d.ex.length:0)+' exercises</option>';
}
return opts;
}

function autoDetectBsWorkout() {
var cidEl=document.getElementById('bs_c'); if(!cidEl)return;
var dateEl=document.getElementById('bs_d'); if(!dateEl||!dateEl.value)return;
var wkEl=document.getElementById('bs_wk'); if(!wkEl)return;
if(wkEl.value!=='')return; // already manually selected
var cid=cidEl.value;
var wd=new Date(dateEl.value+'T12:00:00').getDay();
var prog=getProg(cid);
if(!prog||!prog.days)return;
for(var di=0;di<prog.days.length;di++){

}
}

function doBookSess() {
var cid=(document.getElementById('bs_c')||{}).value;
var date=(document.getElementById('bs_d')||{}).value;
var time=(document.getElementById('bs_t')||{}).value;
var note=((document.getElementById('bs_n')||{}).value||'').trim();
var rpt=(document.getElementById('bs_rpt')||{}).value||'none';
var cnt=parseInt((document.getElementById('bs_cnt')||{}).value)||4;
var wkIdxStr=((document.getElementById('bs_wk')||{}).value||'');
if(!cid||!date){toast('Select client and date','err');return;}
var c=S.clients[cid]||{};
var prog=getProg(cid);
function _buildSessData(dateStr){
var base={date:dateStr,time:time,type:c.type||'inperson',note:note};
var resolvedIdx=wkIdxStr!==''?parseInt(wkIdxStr):null;
if(resolvedIdx===null&&prog&&prog.days){
var wd=new Date(dateStr+'T12:00:00').getDay();
for(var di=0;di<prog.days.length;di++){
if((prog.days[di].weekdays||[]).indexOf(wd)>=0){resolvedIdx=di;break;}
}
}
if(resolvedIdx!==null&&prog&&prog.days&&prog.days[resolvedIdx]){
base.workoutDayIdx=resolvedIdx;
base.workoutName=prog.days[resolvedIdx].title||prog.days[resolvedIdx].tag||'Workout';
}
return base;
}
if(rpt==='none'){
bookSess(cid,_buildSessData(date));
}else{
var days=parseInt(rpt);
var d=new Date(date+'T12:00:00');
for(var i=0;i<cnt;i++){
var ds=d.toISOString().split('T')[0];
bookSess(cid,_buildSessData(ds));
d.setDate(d.getDate()+days);
}
toast(cnt+' sessions booked','ok');
}
closeModal(); R();
}

function _syncSessProg(cid, prog) {
var sessObj=DB.get('sessions_'+cid)||{};
var changed=false;
var keys=Object.keys(sessObj);
for(var i=0;i<keys.length;i++){
var s=sessObj[keys[i]];
if(s.status!=='upcoming'||!s.date)continue;
var wd=new Date(s.date+'T12:00:00').getDay();
var matched=false;
for(var di=0;di<prog.days.length;di++){
var wds=prog.days[di].weekdays||[];
if(wds.indexOf(wd)>=0){
s.workoutDayIdx=di;
s.workoutName=prog.days[di].title||prog.days[di].tag||'Workout';
changed=true;matched=true;break;
}
}
if(!matched&&s.workoutDayIdx!==undefined){delete s.workoutDayIdx;delete s.workoutName;changed=true;}
}
if(changed)DB.set('sessions_'+cid,sessObj);
}
function doSaveBuilder() {
_syncBP();
var prog=_bp.prog, cid=_bp.cid;
if(!prog.days.length){toast('Add at least one training day','err');return;}
var progs=getProgs(cid);
if(_bp.editId){
var idx=-1;
for(var i=0;i<progs.length;i++){if(progs[i].id===_bp.editId){idx=i;break;}}
if(idx>=0)progs[idx]=prog;else progs.push(prog);
_bp.editId=null;
DB.set('progs_'+cid,progs);
_syncSessProg(cid,prog);
closeModal(); toast(prog.name+' updated!','ok'); R();
}else{
progs.push(prog);
DB.set('progs_'+cid,progs);
var cp=DB.get('cp_'+cid)||{}; cp.currentProgId=prog.id;
DB.set('cp_'+cid,cp);
var templates=DB.get('prog_templates')||[];
templates.push(JSON.parse(JSON.stringify(prog)));
DB.set('prog_templates',templates);
_syncSessProg(cid,prog);
trackUsage('programsCreated');
closeModal(); toast(prog.name+' saved as template!','ok'); R();
}
}

function _renderAIReminder(){
var goals=DB.get('goals_'+S.cid)||[];

var list=hd.list||[];
var todayLogs=((hd.logs||{})[today()])||[];
var activeGoals=goals.filter(function(g){return !g.achieved;});
var undone=list.filter(function(h){return todayLogs.indexOf(h.id)<0;});
var streak=(S.streak&&S.streak.cur)||0;
var lines=[];
if(streak>=21){lines.push('&#128293; <strong>'+streak+'-day streak.</strong> You\'re in the top 1% of people who show up consistently. Protect it today.');}
else if(streak>=7){lines.push('&#128293; <strong>'+streak+' days straight.</strong> One week of consistency is where habits are born. Keep going.');}
else if(streak>=3){lines.push('&#9889; <strong>'+streak+' in a row.</strong> The momentum is building &mdash; don\'t break the chain today.');}
if(list.length>0){
var doneCnt=list.length-undone.length;
if(undone.length===0){lines.push('&#9989; All '+list.length+' habit'+(list.length===1?'':'s')+' ticked off today &mdash; that\'s what elite consistency looks like.');}
else{lines.push('&#128203; '+doneCnt+'/'+list.length+' habits done. Still to go: '+undone.slice(0,2).map(function(h){return h.icon+' '+h.name;}).join(', ')+(undone.length>2?' &amp; more':'')+'. Finish strong.');}
}
if(activeGoals.length){lines.push('&#127919; Working towards: <em>'+activeGoals[0].text+'</em>. Every session is a step closer. Don\'t let today be a step back.');}
if(!lines.length){lines.push('&#128170; Stay consistent with your program. Small daily efforts compound into the results you\'re chasing.');}
return '<div style="background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(236,72,153,.06));border:1px solid rgba(99,102,241,.25);border-radius:16px;padding:16px;margin-top:6px">' +
'<div style="font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--acc);margin-bottom:10px">&#129504; COACH AI &bull; DAILY INSIGHT</div>' +
'<div style="display:flex;flex-direction:column;gap:7px">' +
lines.map(function(line){return '<div style="font-size:12px;color:var(--m1);line-height:1.7;padding:9px 11px;background:rgba(255,255,255,.03);border-radius:9px">'+line+'</div>';}).join('')+
'</div></div>';
}

function getNutrDate(){return S.nutriDate||today();}
function getNutriData(cid,date){
var all=DB.get('nutrition_'+(cid||S.cid))||{};

if(!d)d={meals:{breakfast:[],lunch:[],dinner:[],snacks:[]},water:0};

function getMacroTargets(){
var bio=DB.get('bio_'+S.cid)||{};

}
function calcNutrTotals(data){
var t={calories:0,protein:0,carbs:0,fat:0};
var types=['breakfast','lunch','dinner','snacks'];
for(var mi=0;mi<types.length;mi++){
var items=data.meals[types[mi]]||[];
for(var ii=0;ii<items.length;ii++){
t.calories+=items[ii].calories||0;t.protein+=items[ii].protein||0;
t.carbs+=items[ii].carbs||0;t.fat+=items[ii].fat||0;
}
}
return t;
}

'</select></div>'+
'<div id="mc_result"></div>'+

'<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'+
'</div></div>');

function doCalcMacros(){
var w=parseFloat((document.getElementById('mc_w')||{}).value||'0');
var h=parseFloat((document.getElementById('mc_h')||{}).value||'0');
var age=parseInt((document.getElementById('mc_age')||{}).value||'0');
var sex=(document.getElementById('mc_sex')||{}).value||'m';
var act=parseFloat((document.getElementById('mc_act')||{}).value||'1.55');
var goal=(document.getElementById('mc_goal')||{}).value||'maintain';
if(!w||!h||!age){toast('Fill in all fields','err');return;}
var bmr=sex==='m'?(10*w+6.25*h-5*age+5):(10*w+6.25*h-5*age-161);
var tdee=Math.round(bmr*act);
var cals=goal==='cut'?tdee-300:goal==='bulk'?tdee+300:tdee;
var protein=Math.round(w*2.2);
var fat=Math.round(cals*0.25/9);
var carbs=Math.round((cals-protein*4-fat*9)/4);
if(carbs<0)carbs=0;
var bio=DB.get('bio_'+S.cid)||{};
bio.weight=w;bio.height=h;bio.age=age;bio.sex=sex;bio.activity=String(act);bio.goal=goal;
bio.macros={calories:cals,protein:protein,carbs:carbs,fat:fat};
DB.set('bio_'+S.cid,bio);
var res=document.getElementById('mc_result');
if(res){
res.innerHTML='<div style="background:var(--c2);border-radius:12px;padding:14px;margin-bottom:14px">'+
'<div style="text-align:center;margin-bottom:12px">'+
'<div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--acc);margin-bottom:4px">YOUR DAILY TARGETS</div>'+
'<div style="font-size:32px;font-weight:900;color:#fff" id="mc_cals_disp">'+cals+'<span style="font-size:14px;color:var(--m1)"> kcal</span></div>'+
'<div style="font-size:10px;color:var(--m2)">TDEE '+tdee+' &#183; '+(goal==='cut'?'-300 cut':goal==='bulk'?'+300 bulk':'maintain')+'&nbsp;&mdash;&nbsp;adjust below to customise</div></div>'+
'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">'+
'<div style="text-align:center;padding:10px 6px;background:rgba(129,140,248,.1);border-radius:10px">'+
'<input id="mc_adj_p" type="number" inputmode="decimal" value="'+protein+'" oninput="recalcMacroCals()" style="width:100%;background:none;border:none;font-size:20px;font-weight:900;color:#818cf8;text-align:center;padding:0">'+
'<div style="font-size:9px;color:var(--m2);margin-top:2px">PROTEIN (g)</div></div>'+
'<div style="text-align:center;padding:10px 6px;background:rgba(52,211,153,.1);border-radius:10px">'+
'<input id="mc_adj_c" type="number" inputmode="decimal" value="'+carbs+'" oninput="recalcMacroCals()" style="width:100%;background:none;border:none;font-size:20px;font-weight:900;color:#34d399;text-align:center;padding:0">'+
'<div style="font-size:9px;color:var(--m2);margin-top:2px">CARBS (g)</div></div>'+
'<div style="text-align:center;padding:10px 6px;background:rgba(245,158,11,.1);border-radius:10px">'+
'<input id="mc_adj_f" type="number" inputmode="decimal" value="'+fat+'" oninput="recalcMacroCals()" style="width:100%;background:none;border:none;font-size:20px;font-weight:900;color:var(--amber);text-align:center;padding:0">'+
'<div style="font-size:9px;color:var(--m2);margin-top:2px">FAT (g)</div></div>'+
'</div>'+
'<button class="btn btn-green" onclick="applyAdjMacros()" style="margin-top:4px">APPLY AS TARGET &#10003;</button>'+
'</div>';
}
}
function recalcMacroCals() {
var p=parseFloat((document.getElementById('mc_adj_p')||{}).value||'0')||0;
var c=parseFloat((document.getElementById('mc_adj_c')||{}).value||'0')||0;
var f=parseFloat((document.getElementById('mc_adj_f')||{}).value||'0')||0;
var total=Math.round(p*4+c*4+f*9);
var el=document.getElementById('mc_cals_disp');
if(el)el.innerHTML=total+'<span style="font-size:14px;color:var(--m1)"> kcal</span>';
}
function applyAdjMacros() {
var p=parseFloat((document.getElementById('mc_adj_p')||{}).value||'0')||0;
var c=parseFloat((document.getElementById('mc_adj_c')||{}).value||'0')||0;
var f=parseFloat((document.getElementById('mc_adj_f')||{}).value||'0')||0;
var cals=Math.round(p*4+c*4+f*9);
var bio=DB.get('bio_'+S.cid)||{};
bio.macros={calories:cals,protein:p,carbs:c,fat:f};
DB.set('bio_'+S.cid,bio);
closeModal();toast('Targets saved!','ok');R();
}

function doLogMeasurements(){
var date=(document.getElementById('lm_date')||{}).value||today();
var flds=[['w','weight'],['chest','chest'],['waist','waist'],['hips','hips'],['arms','arms'],['thighs','thighs']];
var entry={date:date,ts:Date.now()};
for(var i=0;i<flds.length;i++){
var v=parseFloat((document.getElementById('lm_'+flds[i][0])||{}).value||'');
if(v)entry[flds[i][1]]=v;
}
var all=DB.get('measurements_'+S.cid)||[];
all=all.filter(function(m){return m.date!==date;});
all.push(entry);
all.sort(function(a,b){return a.date.localeCompare(b.date);});
DB.set('measurements_'+S.cid,all);
closeModal();toast('Measurements saved!','ok');R();
}

function handlePhotoUpload(event) {
var file = event.target.files[0];
if (!file) return;
var reader = new FileReader();
reader.onload = function(e) {
S._photoData = e.target.result.split(',')[1];
var prev = document.getElementById('photo_preview');
var img = document.getElementById('photo_img');
var qs = document.getElementById('photo_questions');
var btn = document.getElementById('analyze_btn');
if (prev) { prev.style.display='block'; img.src=e.target.result; }
if (qs) qs.style.display='block';
if (btn) btn.style.display='block';
};
reader.readAsDataURL(file);
}

function addToCalendar(evt) {
var startDt = evt.date + 'T' + (evt.time||'10:00') + ':00';
var endH = Math.min(23, parseInt((evt.time||'10:00').split(':')[0])+1);
var endDt = evt.date + 'T' + String(endH).padStart(2,'0') + ':00:00';
var nl = '\r\n';
var ics = 'BEGIN:VCALENDAR' + nl + 'VERSION:2.0' + nl + 'BEGIN:VEVENT' + nl +
'SUMMARY:' + (evt.title||'Training Session') + nl +
'DTSTART:' + startDt.replace(/[-:]/g,'') + 'Z' + nl +
'DTEND:' + endDt.replace(/[-:]/g,'') + 'Z' + nl +
'DESCRIPTION:' + (evt.notes||'') + nl +
'BEGIN:VALARM' + nl + 'TRIGGER:-PT60M' + nl + 'ACTION:DISPLAY' + nl + 'DESCRIPTION:Session in 1 hour' + nl + 'END:VALARM' + nl +
'END:VEVENT' + nl + 'END:VCALENDAR';
var blob = new Blob([ics],{type:'text/calendar'});
var url = URL.createObjectURL(blob);
var a = document.createElement('a');
a.href=url; a.download='session.ics';
document.body.appendChild(a); a.click(); document.body.removeChild(a);
setTimeout(function(){URL.revokeObjectURL(url);},2000);
toast('Calendar file downloaded', 'ok');
}

function parseTime(timeStr) {
var parts = (timeStr||'').split(':');
return parseInt(parts[0]||0)*60 + parseInt(parts[1]||0);
}

function detectClash(forCid, date, time) {
if (!time) return [];
var clashes = [];
var bookTime = parseTime(time);
Object.keys(S.clients).forEach(function(cid) {
var c = S.clients[cid];
Object.values(c.sessions||{}).forEach(function(s) {
if (s.date===date && s.status==='upcoming' && s.time) {
var sessTime = parseTime(s.time);
if (Math.abs(bookTime - sessTime) < 60) {
clashes.push({clientId:cid, clientName:c.name, time:s.time});
}
}
});
});
return clashes;
}

function getDateOffset(days) {
var d = new Date(); d.setDate(d.getDate()+days);
return d.toISOString().split('T')[0];
}

S.trId = sess.trId;
}
if (sess && sess.role === 'trainer') {
S.role='trainer'; S.scr='trainer'; S.tTab='dash';
try { loadAll(); } catch(e) { S.clients={}; }
} else if (sess && sess.role === 'client' && sess.cid) {
try {

S.exN=DB.get('exnotes_'+sess.cid)||{};

S.streak=DB.get('streak_'+sess.cid)||{cur:0,best:0,lastDate:null};
S.prs=DB.get('prs_'+sess.cid)||{};
S.unread=S.msgs.filter(function(m){return m.from==='trainer'&&!m.read;}).length;
} else { S.scr='login'; }
} catch(e) { S.scr='login'; }
} else { S.scr='login'; }
} catch(e) { S.scr='login'; }
try { R(); } catch(e) {
var app=document.getElementById('app');
if(app) app.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#07070e;color:#fff;flex-direction:column;gap:12px;text-align:center"><div style="font-size:48px">🏋</div><div style="font-size:9px;letter-spacing:3px;color:#ec4899;font-weight:700">AHMED PERSONAL TRAINING</div><div style="font-size:24px;font-weight:800">Error loading</div><div style="font-size:13px;color:#8892a4">'+e.message+'</div><button onclick="localStorage.clear();location.reload()" style="padding:12px 24px;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px">Reset & Reload</button></div>';
}
}
setTimeout(function() {

try { R(); } catch(e) {

}
}, 3000);

function startApp() {
syncFromFirebase(function() {
try { init(); } catch(e) {

if (app) app.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#07070e;color:#fff;flex-direction:column;gap:12px;text-align:center"><div style="font-size:48px">🏋</div><div style="font-size:22px;font-weight:800">Error loading</div><div style="font-size:13px;color:#8892a4">' + e.message + '</div><button onclick="location.reload()" style="padding:12px 24px;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px">Reload</button></div>';

}
if (document.readyState === 'loading') {

} else {

}
