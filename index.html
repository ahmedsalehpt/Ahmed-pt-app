if (FB_LOCAL_ONLY.indexOf(k) === -1) {
try { localStorage.setItem(k, JSON.stringify(data[k])); } catch(e) {}
}
});

callback();
}).catch(function(err) {

done = true; clearTimeout(timer);
toast('Firebase error: ' + (err.message || err.code || 'check rules'), 'err');
callback();
}

S.restTimer.secs = 0;
var el = document.getElementById('rest-banner');
if (el) el.style.display = 'none';
}
function tickRest() {
var el = document.getElementById('rest-banner');
if (!el) { stopRest(); return; }
if (S.restTimer.secs <= 0) {
el.className = 'rb-red rb-pulse';
el.innerHTML = '&#9200; REST DONE &#8212; Tap to dismiss';
if (S.restTimer.iv) { clearInterval(S.restTimer.iv); S.restTimer.iv = null; }
return;
}
var m = Math.floor(S.restTimer.secs / 60);
var sec = S.restTimer.secs % 60;
var ts = m > 0 ? m + ':' + (sec < 10 ? '0' : '') + sec : sec + 's';
el.className = S.restTimer.secs > 30 ? 'rb-green' : 'rb-amber';
el.innerHTML = '&#9201; REST: ' + ts + ' &#8212; Tap to skip';
S.restTimer.secs--;
}
function dismissRest() { stopRest(); }

}

function getDailyMotivation(d, streak, weekNum) {
if(!d)return'';
var tag=(d.tag||'').toLowerCase();
var phase=((weekNum-1)%4)+1;
var pool=[];
if(streak>=30)pool.push('30 days straight. You are literally built different. This is what elite looks like.');
else if(streak>=14)pool.push('Two weeks solid. Most people quit by now. You didn\'t. That\'s everything.');
else if(streak>=7)pool.push('A full week without missing. Consistency is your superpower right now. Protect it.');
else if(streak>=3)pool.push('Three in a row. The momentum is real. Don\'t let it slip today.');
else if(streak===1)pool.push('You showed up yesterday. Let\'s make it two. One session at a time.');
else pool.push('Every session is a vote for the person you\'re becoming. Cast it today.');
if(tag.indexOf('push')>=0||tag.indexOf('chest')>=0){
pool.push('Push day. Every controlled rep is sculpting the physique you\'re working towards.');
pool.push('Chest and shoulders today. Full range, slow eccentric. Make it count.');
}else if(tag.indexOf('pull')>=0||tag.indexOf('back')>=0){
pool.push('Pull day. The back you build today is the foundation for everything else.');
pool.push('Lats, rear delts, biceps. Train the back like it deserves to be trained.');
}else if(tag.indexOf('leg')>=0||tag.indexOf('lower')>=0||tag.indexOf('squat')>=0){
pool.push('Leg day. The ones who skip this stay average. You\'re not average.');
pool.push('Lower body session. Full depth. Drive through heels. Champions are made here.');
}else if(tag.indexOf('glute')>=0||tag.indexOf('hip')>=0){
pool.push('Glute day. Mind-muscle connection is everything. Feel every single rep.');
}else if(tag.indexOf('full')>=0){
pool.push('Full body today. Hit every muscle, leave nothing in the tank.');
}else{
pool.push('Today\'s session is a deposit into your future self. Make it a big one.');
}
if(phase===1)pool.push('Foundation week. Perfect form over everything today. The weight follows the technique.');
else if(phase===2)pool.push('Volume week. Your body is adapting fast. Push a little more than last week.');
else if(phase===3)pool.push('Intensity week. This is where real growth happens. Embrace the challenge.');
else if(phase===4)pool.push('Overload week. Final push of the block. Give everything you have today.');
return pool[Math.floor(Date.now()/86400000)%pool.length];
}

function getDayScheduled(d) { return d.scheduledDays || d.weekdays || []; }
function getDurationWeeks(prog) { return prog ? (prog.durationWeeks || prog.duration || 4) : 4; }
function getNextScheduledDay(prog) {
if (!prog) return null;
var days = prog.days || [];
var wd = new Date().getDay();
var best = null, bestDiff = 99;
for (var i = 0; i < days.length; i++) {
var sched = getDayScheduled(days[i]);
for (var j = 0; j < sched.length; j++) {
var diff = (sched[j] - wd + 7) % 7;
if (diff > 0 && diff < bestDiff) { bestDiff = diff; best = {day: days[i], dayIdx: i, diff: diff, wd: sched[j]}; }
}
}
return best;
}
function getCurrentWeek(cid) {
var prog = getProg(cid); if (!prog) return S.week;
if (!prog.startDate) return S.week;
var daysSince = Math.floor((Date.now() - prog.startDate) / 86400000);
return Math.min(Math.max(1, Math.floor(daysSince / 7) + 1), getDurationWeeks(prog));
}
function hasDayLog(weekNum, dayIdx) {

}

function bookSess(cid, data) {
var id = 's' + Date.now();

Object.keys(data).forEach(function(k){ sess[k] = data[k]; });
var local = DB.get('sessions_' + cid) || {};
local[id] = sess;
DB.set('sessions_' + cid, local);
if (!S.clients[cid]) S.clients[cid] = {};
if (!S.clients[cid].sessions) S.clients[cid].sessions = {};
S.clients[cid].sessions[id] = sess;
toast('Session booked', 'ok');
}
function completeSess(cid, sessId) {
var local = DB.get('sessions_' + cid) || {};
if (local[sessId]) local[sessId].status = 'done';
DB.set('sessions_' + cid, local);
var bal = Math.max(0, (S.clients[cid] ? S.clients[cid].balance || 0 : 0) - 1);
if (S.clients[cid]) S.clients[cid].balance = bal;
if (S.clients[cid] && S.clients[cid].sessions && S.clients[cid].sessions[sessId]) {
S.clients[cid].sessions[sessId].status = 'done';
}
DB.set('tc', S.clients);
toast('Session completed - 1 session deducted', 'ok');
}
function logPay(cid, amount, note) {
var c = S.clients[cid] || {};
var rate = c.rate || 0;
var sessions = rate > 0 ? Math.round(amount / rate) : 0;
var pay = {id:'p'+Date.now(), amount:amount, sessions:sessions, date:today(), ts:Date.now(), note:note||''};
var pays = DB.get('payments_' + cid) || {};
pays[pay.id] = pay;
DB.set('payments_' + cid, pays);
if (!S.clients[cid]) S.clients[cid] = {};
S.clients[cid].balance = (S.clients[cid].balance || 0) + sessions;
if (!S.clients[cid].payments) S.clients[cid].payments = {};
S.clients[cid].payments[pay.id] = pay;
DB.set('tc', S.clients);
trackUsage('paymentsLogged');

function monthStats() {
var now = new Date();
var mn = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
var rev = 0, sessDone = 0, needPay = 0, alerts = [];
Object.keys(S.clients).forEach(function(cid) {
var c = S.clients[cid];
Object.values(c.payments||{}).forEach(function(p){ if(p.date&&p.date.startsWith(mn)) rev+=p.amount||0; });
Object.values(c.sessions||{}).forEach(function(s){ if(s.status==='done'&&s.doneAt&&new Date(s.doneAt).toISOString().startsWith(mn)) sessDone++; });
var bal = c.balance||0;
if (bal===0) { needPay++; alerts.push({cid:cid,name:c.name,type:'zero',msg:'No sessions left - needs payment'}); }
else if (bal<=2) alerts.push({cid:cid,name:c.name,type:'low',msg:'Only '+bal+' session'+(bal===1?'':'s')+' remaining'});
});
return {rev:rev, sessDone:sessDone, needPay:needPay, alerts:alerts};
}

function doAddClient() {
if (!canAddClient()) { showUpgradeModal('clientLimit'); return; }
var name = ((document.getElementById('nc_n')||{}).value||'').trim();
var type = (document.getElementById('nc_t')||{}).value||'inperson';
var curr = (document.getElementById('nc_c')||{}).value||'GBP';
var rate = parseFloat((document.getElementById('nc_r')||{}).value||'0')||0;
var pin = ((document.getElementById('nc_p')||{}).value||'').trim();
var goal = (document.getElementById('nc_goal')||{}).value||'';
var exp = (document.getElementById('nc_exp')||{}).value||'beginner';
var bw = parseFloat((document.getElementById('nc_bw')||{}).value||'0')||0;
var tw = parseFloat((document.getElementById('nc_tw')||{}).value||'0')||0;
var inj = ((document.getElementById('nc_inj')||{}).value||'').trim();
var err = document.getElementById('nc_err');
if (!name) { if(err) err.innerHTML='<div class="err-msg">Enter client name</div>'; return; }
if (pin.length<4) { if(err) err.innerHTML='<div class="err-msg">PIN must be 4 digits</div>'; return; }
var cid = name.toLowerCase().replace(/[^a-z0-9]/g,'*') + '*' + Date.now();
var intake = {goal:goal, experience:exp, bodyWeight:bw||null, targetWeight:tw||null, injuries:inj||null, addedAt:Date.now()};
var data = {name:name, type:type, currency:curr, rate:rate, pin:pin, unit:'kg', week:1, currentProgId:null, intake:intake};
DB.set('cp_'+cid, data);
S.clients[cid] = {name:name, type:type, currency:curr, rate:rate, balance:0, streak:{cur:0}, msgCount:0, sessions:{}, payments:{}};
DB.set('tc', S.clients);
DB.set('sessions_'+cid, {});
DB.set('payments_'+cid, {});
DB.set('msgs_'+cid, []);
closeModal();
toast(name+' added! PIN: '+pin, 'ok');
setTimeout(function(){ openAddProg(cid); }, 400);
R();
}

function buildSessLog(logs, cid) {
var sess = {}, progs = getProgs(cid), cp = getProg(cid);
Object.keys(logs).forEach(function(key) {
var l = logs[key]; if (!l||!l.done) return;
var p = key.split('_');
var w=parseInt(p[0].replace('w','')),d=parseInt(p[1].replace('d','')),ei=parseInt(p[2].replace('e','')),si=parseInt(p[3].replace('s',''));
var k2='w'+w+'_d'+d;
var day = cp && cp.days ? cp.days[d] : null;
if (!sess[k2]) sess[k2]={w:w,d:d,day:day,exLogs:{},sk:k2,ts:l.ts||0};
if (!sess[k2].exLogs[ei]) sess[k2].exLogs[ei]={ex:day&&day.ex?day.ex[ei]:null,sets:{}};
sess[k2].exLogs[ei].sets[si]=l;
if((l.ts||0)>sess[k2].ts)sess[k2].ts=l.ts;
});
return Object.values(sess).sort(function(a,b){return b.ts-a.ts;});
}

function buildProgData(logs, cid) {
var ex={}, progs=getProgs(cid);
Object.keys(logs).forEach(function(key){
var l=logs[key]; if(!l||!l.done||!l.weight)return;
var p=key.split('_');
var w=parseInt(p[0].replace('w','')),d=parseInt(p[1].replace('d','')),ei=parseInt(p[2].replace('e',''));
var exName=l.exName;
if(!exName){for(var pi=0;pi<progs.length;pi++){var pr=progs[pi];if(pr.days&&pr.days[d]&&pr.days[d].ex&&pr.days[d].ex[ei]){exName=pr.days[d].ex[ei].n;break;}}}
if(!exName)return;
var k=exName.replace(/[^a-zA-Z0-9]/g,'_');
if(!ex[k])ex[k]={name:exName,bw:{}};
var wt=parseFloat(l.weight)||0;
if(!ex[k].bw[w]||wt>ex[k].bw[w])ex[k].bw[w]=wt;
});
return Object.values(ex).filter(function(e){return Object.keys(e.bw).length>0;});
}

function buildCliProgData() {
var ex={}, progs=getProgs();
Object.keys(S.logs).forEach(function(key){
var l=S.logs[key]; if(!l||!l.done||!l.weight)return;
var p=key.split('_');
var w=parseInt(p[0].replace('w','')),d=parseInt(p[1].replace('d','')),ei=parseInt(p[2].replace('e',''));
var exName=l.exName;
if(!exName){for(var pi=0;pi<progs.length;pi++){var pr=progs[pi];if(pr.days&&pr.days[d]&&pr.days[d].ex&&pr.days[d].ex[ei]){exName=pr.days[d].ex[ei].n;break;}}}
if(!exName)return;
var k=exName.replace(/[^a-zA-Z0-9]/g,'_');
if(!ex[k])ex[k]={name:exName,bw:{}};
var wt=parseFloat(l.weight)||0;
if(!ex[k].bw[w]||wt>ex[k].bw[w])ex[k].bw[w]=wt;
});
return Object.values(ex).filter(function(e){return Object.keys(e.bw).length>0;});
}
function renderHistLog() {
var ss={};

function getNutrDate(){return S.nutriDate||today();}
function getNutriData(cid,date){
var all=DB.get('nutrition_'+(cid||S.cid))||{};

if(!d)d={meals:{breakfast:[],lunch:[],dinner:[],snacks:[]},water:0};

}

var all=DB.get('nutrition_'+S.cid)||{};

}
function getMacroTargets(){
var bio=DB.get('bio_'+S.cid)||{};
return bio.macros||{calories:2000,protein:150,carbs:220,fat:65};
}
function calcNutrTotals(data){
var t={calories:0,protein:0,carbs:0,fat:0};
var types=['breakfast','lunch','dinner','snacks'];
for(var mi=0;mi<types.length;mi++){
var items=data.meals[types[mi]]||[];
for(var ii=0;ii<items.length;ii++){
t.calories+=items[ii].calories||0;t.protein+=items[ii].protein||0;
t.carbs+=items[ii].carbs||0;t.fat+=items[ii].fat||0;
}
}
return t;
}

function doCalcMacros(){
var w=parseFloat((document.getElementById('mc_w')||{}).value||'0');
var h=parseFloat((document.getElementById('mc_h')||{}).value||'0');
var age=parseInt((document.getElementById('mc_age')||{}).value||'0');
var sex=(document.getElementById('mc_sex')||{}).value||'m';
var act=parseFloat((document.getElementById('mc_act')||{}).value||'1.55');
var goal=(document.getElementById('mc_goal')||{}).value||'maintain';
if(!w||!h||!age){toast('Fill in all fields','err');return;}
var bmr=sex==='m'?(10*w+6.25*h-5*age+5):(10*w+6.25*h-5*age-161);
var tdee=Math.round(bmr*act);
var cals=goal==='cut'?tdee-300:goal==='bulk'?tdee+300:tdee;
var protein=Math.round(w*2.2);
var fat=Math.round(cals*0.25/9);
var carbs=Math.round((cals-protein*4-fat*9)/4);
if(carbs<0)carbs=0;
var bio=DB.get('bio_'+S.cid)||{};
bio.weight=w;bio.height=h;bio.age=age;bio.sex=sex;bio.activity=String(act);bio.goal=goal;
bio.macros={calories:cals,protein:protein,carbs:carbs,fat:fat};
DB.set('bio_'+S.cid,bio);
var res=document.getElementById('mc_result');
if(res){
res.innerHTML='<div style="background:var(--c2);border-radius:12px;padding:14px;margin-bottom:14px">'+
'<div style="text-align:center;margin-bottom:12px">'+
'<div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--acc);margin-bottom:4px">YOUR DAILY TARGETS</div>'+
'<div style="font-size:32px;font-weight:900;color:#fff">'+cals+'<span style="font-size:14px;color:var(--m1)"> kcal</span></div>'+
'<div style="font-size:10px;color:var(--m2)">TDEE '+tdee+' &#183; '+(goal==='cut'?'-300 cut':goal==='bulk'?'+300 bulk':'maintain')+'</div></div>'+
'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'+
'<div style="text-align:center;padding:10px 6px;background:rgba(129,140,248,.1);border-radius:10px"><div style="font-size:20px;font-weight:900;color:#818cf8">'+protein+'g</div><div style="font-size:9px;color:var(--m2);margin-top:2px">PROTEIN</div></div>'+
'<div style="text-align:center;padding:10px 6px;background:rgba(52,211,153,.1);border-radius:10px"><div style="font-size:20px;font-weight:900;color:#34d399">'+carbs+'g</div><div style="font-size:9px;color:var(--m2);margin-top:2px">CARBS</div></div>'+
'<div style="text-align:center;padding:10px 6px;background:rgba(245,158,11,.1);border-radius:10px"><div style="font-size:20px;font-weight:900;color:var(--amber)">'+fat+'g</div><div style="font-size:9px;color:var(--m2);margin-top:2px">FAT</div></div>'+
'</div>'+
'<button class="btn btn-green" onclick="closeModal();toast(\'Targets saved!\',\'ok\');R()" style="margin-top:12px">APPLY AS TARGET &#10003;</button>'+
'</div>';
}
}

'</div></div>');
}
function doCheckin(){
var sleep=parseInt((document.getElementById('ci_sleep')||{}).value||'5');
var sore=parseInt((document.getElementById('ci_sore')||{}).value||'5');
var energy=parseInt((document.getElementById('ci_energy')||{}).value||'5');
var mood=parseInt((document.getElementById('ci_mood')||{}).value||'5');
var all=DB.get('recovery_'+S.cid)||{};
all[today()]={sleep:sleep,soreness:sore,energy:energy,mood:mood,ts:Date.now()};
DB.set('recovery_'+S.cid,all);
closeModal();toast('Check-in saved!','ok');R();
}


// ===== MEASUREMENTS =====
function renderMeasurements(){
var all=DB.get('measurements_'+S.cid)||[];
var latest=all.length?all[all.length-1]:null;
var prev=all.length>1?all[all.length-2]:null;
var fields=[
{key:'weight',label:'Weight',unit:'kg',icon:'&#9878;'},
{key:'chest',label:'Chest',unit:'cm',icon:'&#128137;'},
{key:'waist',label:'Waist',unit:'cm',icon:'&#128098;'},
{key:'hips',label:'Hips',unit:'cm',icon:'&#128104;'},
{key:'arms',label:'Arms',unit:'cm',icon:'&#128170;'},
{key:'thighs',label:'Thighs',unit:'cm',icon:'&#129463;'}
];
return '<div class="hdr"><div class="hdr-top">'+
'<div><div class="hdr-sub">Body</div><div class="hdr-title">Measurements</div></div>'+
'<button onclick="openLogMeasurements()" class="btn-sm btn-acc">+ Log</button>'+
'</div></div>'+
'<div class="page">'+
(latest?'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'+
fields.map(function(f){
var val=latest[f.key];
var pv=prev?prev[f.key]:null;
var diff=(val&&pv)?(parseFloat(val)-parseFloat(pv)):null;
return '<div style="background:var(--c1);border:1px solid var(--bdr);border-radius:12px;padding:13px">'+
'<div style="font-size:18px;margin-bottom:4px">'+f.icon+'</div>'+
'<div style="font-size:11px;color:var(--m2);margin-bottom:4px">'+f.label+'</div>'+
(val?'<div style="font-size:24px;font-weight:900;color:#fff">'+val+'<span style="font-size:11px;color:var(--m2)"> '+f.unit+'</span></div>':'<div style="font-size:16px;color:var(--m2)">-</div>')+
(diff!==null?'<div style="font-size:10px;font-weight:700;color:'+(diff<0?'var(--green)':diff>0?'var(--red)':'var(--m2)')+'">'+( diff>0?'+':'')+diff.toFixed(1)+f.unit+'</div>':'')+
'</div>';
}).join('')+'</div>':
'<div class="empty">No measurements yet.<br>Log your first measurement to track progress.</div>')+
(all.length>0?'<div class="sect">HISTORY</div>'+
all.slice(-5).reverse().map(function(m){
return '<div style="padding:10px 12px;background:var(--c1);border:1px solid var(--bdr);border-radius:10px;margin-bottom:6px">'+
'<div style="font-size:11px;color:var(--m1);margin-bottom:6px;font-weight:700">'+fmtD(m.date)+'</div>'+
'<div style="display:flex;gap:12px;flex-wrap:wrap">'+
fields.filter(function(f){return m[f.key];}).map(function(f){
return '<div><span style="font-size:10px;color:var(--m2)">'+f.label+': </span><span style="font-size:11px;font-weight:700;color:#fff">'+m[f.key]+f.unit+'</span></div>';
}).join('')+
'</div></div>';
}).join(''):'')+
'</div>'+cliNav();
}
function openLogMeasurements(){
var latest=(DB.get('measurements_'+S.cid)||[]).slice(-1)[0]||{};
showModal('<div class="modal-bg" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()">'+
'<div class="modal-title">Log Measurements <button onclick="closeModal()" style="font-size:22px;color:var(--m1);cursor:pointer">&#215;</button></div>'+
'<div class="row"><div class="lbl">Date</div><input class="inp" id="lm_date" type="date" value="'+today()+'"></div>'+
'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'+
'<div><div class="lbl">Weight (kg)</div><input class="inp" id="lm_w" type="number" value="'+(latest.weight||'')+'" placeholder="80" inputmode="decimal" style="margin-bottom:0"></div>'+
'<div><div class="lbl">Chest (cm)</div><input class="inp" id="lm_chest" type="number" value="'+(latest.chest||'')+'" placeholder="100" inputmode="decimal" style="margin-bottom:0"></div>'+
'</div>'+
'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'+
'<div><div class="lbl">Waist (cm)</div><input class="inp" id="lm_waist" type="number" value="'+(latest.waist||'')+'" placeholder="85" inputmode="decimal" style="margin-bottom:0"></div>'+
'<div><div class="lbl">Hips (cm)</div><input class="inp" id="lm_hips" type="number" value="'+(latest.hips||'')+'" placeholder="95" inputmode="decimal" style="margin-bottom:0"></div>'+
'</div>'+
'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'+
'<div><div class="lbl">Arms (cm)</div><input class="inp" id="lm_arms" type="number" value="'+(latest.arms||'')+'" placeholder="35" inputmode="decimal" style="margin-bottom:0"></div>'+
'<div><div class="lbl">Thighs (cm)</div><input class="inp" id="lm_thighs" type="number" value="'+(latest.thighs||'')+'" placeholder="55" inputmode="decimal" style="margin-bottom:0"></div>'+
'</div>'+
'<button class="btn btn-acc" onclick="doLogMeasurements()">SAVE &#10003;</button>'+
'<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'+
'</div></div>');
}
function doLogMeasurements(){
var date=(document.getElementById('lm_date')||{}).value||today();
var flds=[['w','weight'],['chest','chest'],['waist','waist'],['hips','hips'],['arms','arms'],['thighs','thighs']];
var entry={date:date,ts:Date.now()};
for(var i=0;i<flds.length;i++){
var v=parseFloat((document.getElementById('lm_'+flds[i][0])||{}).value||'');
if(v)entry[flds[i][1]]=v;
}
var all=DB.get('measurements_'+S.cid)||[];
all=all.filter(function(m){return m.date!==date;});
all.push(entry);
all.sort(function(a,b){return a.date.localeCompare(b.date);});
DB.set('measurements_'+S.cid,all);
closeModal();toast('Measurements saved!','ok');R();
}


// ===== TRAINER NUTRITION NOTES =====
function renderCliNutr(cid, c){
var allNotes=DB.get('nutr_notes_'+cid)||{};
var allNutr=DB.get('nutrition_'+cid)||{};
var today_str=today();
var todayData=allNutr[today_str]||{meals:{breakfast:[],lunch:[],dinner:[],snacks:[]},water:0};
var todayTotals={calories:0,protein:0,carbs:0,fat:0};
var types=['breakfast','lunch','dinner','snacks'];
for(var mi=0;mi<types.length;mi++){
var items=(todayData.meals&&todayData.meals[types[mi]])||[];
for(var ii=0;ii<items.length;ii++){
todayTotals.calories+=items[ii].calories||0;
todayTotals.protein+=items[ii].protein||0;
todayTotals.carbs+=items[ii].carbs||0;
todayTotals.fat+=items[ii].fat||0;
}
}
var bio=DB.get('bio_'+cid)||{};
var targets=bio.macros||null;
var recentDates=Object.keys(allNutr).sort().reverse().slice(0,5);
var existingNote=allNotes[today_str]||'';
return '<div class="sect" style="margin-top:0">TODAY&#39;S NUTRITION &#8212; '+c.name+'</div>'+
'<div class="card"><div class="card-p">'+
'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'+
'<div style="text-align:center;padding:10px;background:rgba(255,255,255,.03);border-radius:10px"><div style="font-size:20px;font-weight:900;color:var(--green)">'+todayTotals.calories+'</div><div style="font-size:9px;color:var(--m2)">Calories</div>'+(targets?'<div style="font-size:9px;color:var(--m2)">/ '+targets.calories+' target</div>':'')+'</div>'+
'<div style="text-align:center;padding:10px;background:rgba(255,255,255,.03);border-radius:10px"><div style="font-size:20px;font-weight:900;color:#818cf8">'+todayTotals.protein+'g</div><div style="font-size:9px;color:var(--m2)">Protein</div>'+(targets?'<div style="font-size:9px;color:var(--m2)">/ '+targets.protein+'g target</div>':'')+'</div>'+
'</div>'+
'<div class="lbl">SEND NUTRITION NOTE TO '+c.name.toUpperCase()+'</div>'+
'<textarea class="inp" id="nn_txt" rows="3" placeholder="e.g. Great macros today! Try to add more protein at breakfast...">'+existingNote+'</textarea>'+
'<button class="btn btn-acc" style="margin-top:8px" onclick="doSendNutrNote(\''+cid+'\')">SEND NOTE &#10003;</button>'+
'</div></div>'+
(targets?'<div class="sect">MACRO TARGETS</div>'+
'<div class="card"><div class="card-p">'+
'<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px">'+
'<div style="text-align:center"><div style="font-size:16px;font-weight:900;color:var(--green)">'+targets.calories+'</div><div style="font-size:9px;color:var(--m2)">kcal</div></div>'+
'<div style="text-align:center"><div style="font-size:16px;font-weight:900;color:#818cf8">'+targets.protein+'g</div><div style="font-size:9px;color:var(--m2)">protein</div></div>'+
'<div style="text-align:center"><div style="font-size:16px;font-weight:900;color:#34d399">'+targets.carbs+'g</div><div style="font-size:9px;color:var(--m2)">carbs</div></div>'+
'<div style="text-align:center"><div style="font-size:16px;font-weight:900;color:var(--amber)">'+targets.fat+'g</div><div style="font-size:9px;color:var(--m2)">fat</div></div>'+
'</div></div></div>':
'<div style="font-size:11px;color:var(--m2);padding:8px;margin-bottom:10px">No macro targets set yet. Client sets these in the Nutrition tab.</div>')+
(recentDates.length?'<div class="sect">RECENT LOGS</div>'+
recentDates.map(function(d){
var dd=allNutr[d];
var dc={calories:0,protein:0};
var typ=['breakfast','lunch','dinner','snacks'];
for(var i=0;i<typ.length;i++){var it=(dd.meals&&dd.meals[typ[i]])||[];for(var j=0;j<it.length;j++){dc.calories+=it[j].calories||0;dc.protein+=it[j].protein||0;}}
return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--c1);border:1px solid var(--bdr);border-radius:10px;margin-bottom:6px">'+
'<div style="font-size:12px;color:var(--m1)">'+fmtD(d)+'</div>'+
'<div style="display:flex;gap:12px"><span style="font-size:12px;font-weight:700;color:var(--green)">'+dc.calories+' kcal</span><span style="font-size:12px;color:#818cf8">'+dc.protein+'g protein</span></div>'+
'</div>';
}).join(''):
'<div class="empty">No nutrition logs yet.</div>');
}
function doSendNutrNote(cid){
var txt=((document.getElementById('nn_txt')||{}).value||'').trim();
if(!txt){toast('Enter a note','err');return;}
var all=DB.get('nutr_notes_'+cid)||{};
all[today()]=txt;
DB.set('nutr_notes_'+cid,all);
toast('Nutrition note sent to client','ok');
}

function init() {
try {
var sess = DB.get('sess');
if (sess && sess.role === 'trainer') {
S.role='trainer'; S.scr='trainer'; S.tTab='dash';
try { loadAll(); } catch(e) { S.clients={}; }
} else if (sess && sess.role === 'client' && sess.cid) {
try {
var cp = DB.get('cp_' + sess.cid);
if (cp) {
S.role='client'; S.scr='client'; S.cid=sess.cid;
S.unit=cp.unit||'kg'; S.week=cp.week||1;
S.logs=DB.get('logs_'+sess.cid)||{};
S.exN=DB.get('exnotes_'+sess.cid)||{};
S.sN=DB.get('sessnotes_'+sess.cid)||{};
S.msgs=DB.get('msgs_'+sess.cid)||[];
S.streak=DB.get('streak_'+sess.cid)||{cur:0,best:0,lastDate:null};
S.prs=DB.get('prs_'+sess.cid)||{};
S.unread=S.msgs.filter(function(m){return m.from==='trainer'&&!m.read;}).length;
} else { S.scr='login'; }
} catch(e) { S.scr='login'; }
} else { S.scr='login'; }
} catch(e) { S.scr='login'; }
try { R(); } catch(e) {
var app=document.getElementById('app');
if(app) app.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#07070e;color:#fff;flex-direction:column;gap:12px;text-align:center"><div style="font-size:48px">🏋</div><div style="font-size:9px;letter-spacing:3px;color:#ec4899;font-weight:700">AHMED PERSONAL TRAINING</div><div style="font-size:24px;font-weight:800">Error loading</div><div style="font-size:13px;color:#8892a4">'+e.message+'</div><button onclick="localStorage.clear();location.reload()" style="padding:12px 24px;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px">Reset & Reload</button></div>';
}
}
setTimeout(function() {
var app = document.getElementById('app');
if (app && app.innerHTML.indexOf('Loading') !== -1) {
S.scr = 'login';
try { R(); } catch(e) {
app.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#07070e;color:#fff;flex-direction:column;gap:16px;text-align:center"><div style="font-size:48px">🏋</div><div style="font-size:9px;letter-spacing:3px;color:#ec4899;font-weight:700">AHMED PERSONAL TRAINING</div><div style="font-size:22px;font-weight:800;color:#fff">Welcome</div><div style="font-size:13px;color:#8892a4;line-height:1.6">App loaded. Please reload the page.</div><button onclick="location.reload()" style="padding:14px 28px;background:#6366f1;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer">Reload App</button></div>';
}
}
}, 3000);

function startApp() {
syncFromFirebase(function() {
try { init(); } catch(e) {
var app = document.getElementById('app');
if (app) app.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#07070e;color:#fff;flex-direction:column;gap:12px;text-align:center"><div style="font-size:48px">🏋</div><div style="font-size:22px;font-weight:800">Error loading</div><div style="font-size:13px;color:#8892a4">' + e.message + '</div><button onclick="location.reload()" style="padding:12px 24px;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px">Reload</button></div>';
}
});
}
if (document.readyState === 'loading') {
document.addEventListener('DOMContentLoaded', startApp);
} else {
startApp();
}

</script>
