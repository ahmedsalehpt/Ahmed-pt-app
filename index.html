:40px;border-radius:12px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;flex-shrink:0;cursor:pointer;border:none} .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end} .modal-box{background:var(--c1);border-radius:18px 18px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto} .modal-title{font-size:18px;font-weight:800;color:#fff;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center} .toast-bar{position:fixed;top:0;left:0;right:0;z-index:999;padding:8px 16px;font-size:11px;font-weight:700;text-align:center;display:none;letter-spacing:.5px} .t-ok{background:rgba(16,185,129,.95);color:#fff} .t-err{background:rgba(239,68,68,.95);color:#fff} .t-info{background:rgba(99,102,241,.95);color:#fff} .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)} .login-box{width:100%;max-width:400px} .login-logo{text-align:center;margin-bottom:28px} .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px} .role-card{padding:16px;border-radius:13px;border:2px solid var(--bdr);background:var(--c1);cursor:pointer;text-align:center;transition:all .15s} .role-card.on{border-color:var(--acc);background:rgba(99,102,241,.08)} .err-msg{font-size:11px;color:#f87171;padding:8px 11px;background:rgba(239,68,68,.08);border-radius:8px;margin-bottom:10px;border:1px solid rgba(239,68,68,.15)} .ok-msg{font-size:11px;color:#34d399;padding:8px 11px;background:rgba(16,185,129,.08);border-radius:8px;margin-bottom:10px;border:1px solid rgba(16,185,129,.15)} .wk-banner{padding:8px 12px;border-left:3px solid var(--acc);background:rgba(99,102,241,.05);border-radius:0 8px 8px 0;margin-bottom:12px} .alt-wrap{padding:10px 13px 12px;background:rgba(245,158,11,.04);border-top:1px solid rgba(245,158,11,.12)} .alt-btn{display:block;width:100%;text-align:left;padding:8px 11px;background:va <body>
<div id="toast" class="toast-bar"></div>
<div id="modal"></div>
<div id="app">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:#07070e;padding:20px;text-align:center">
<div style="font-size:9px;letter-spacing:3px;color:#ec4899;font-weight:700">AHMED PERSONAL TRAINING</div>
<div style="font-size:26px;font-weight:900;color:#fff">Loading...</div>
</div>
</div>
<script>

‘use strict’;

var PROG = {
“mens”:{“name”:“Elite Protocol - 4 Day”,“days”:[]},
“womens”:{“name”:“Women’s Protocol - 3 Day”,“days”:[]}
};
var WK = {“1”:{“l”:“FOUNDATION”,“c”:”#60a5fa”,“n”:“2-3 RIR. Establish patterns. Full ROM.”},“2”:{“l”:“VOLUME”,“c”:”#34d399”,“n”:”+1 set on compounds. +2.5-5kg where form is solid.”},“3”:{“l”:“INTENSITY”,“c”:”#f59e0b”,“n”:”+5% load. 3-second eccentric every rep.”},“4”:{“l”:“OVERLOAD”,“c”:”#f87171”,“n”:“Drop set last isolation. 0-1 RIR. Deload next week.”}};
var CURRENCIES = [“GBP”, “USD”, “EUR”, “AED”, “SAR”, “CHF”, “CAD”, “AUD”];

var DB = {
get: function(k) {
try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e) { return null; }
},
set: function(k, v) {
try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
},
del: function(k) {
try { localStorage.removeItem(k); } catch(e) {}
}
};

var S = {
scr: ‘login’,
role: null, cid: null, lRole: ‘trainer’,
tTab: ‘dash’, vCli: null, cliTab: ‘log’,
cTab: ‘workout’,
day: 0, week: 1, unit: ‘kg’,
aSet: null, xNote: -1, xAlt: -1, rpe: null, swaps: {},
logs: {}, exN: {}, sN: {}, msgs: [], streak: {cur:0,best:0,lastDate:null}, prs: {},
clients: {}, unread: 0, expS: {}, cliData: {}
};

var _toastT = null;
function toast(msg, type) {
var el = document.getElementById(‘toast’);
if (!el) return;
el.textContent = msg;
el.className = ‘toast-bar t-’ + (type || ‘ok’);
el.style.display = ‘block’;
clearTimeout(_toastT);
_toastT = setTimeout(function() { el.style.display = ‘none’; }, 3000);
}

function showModal(html) {
var m = document.getElementById(‘modal’);
if (m) m.innerHTML = html;
}
function closeModal() {
var m = document.getElementById(‘modal’);
if (m) m.innerHTML = ‘’;
}

function today() { return new Date().toISOString().split(‘T’)[0]; }
function fmtD(d) {
if (!d) return ‘’;
try { return new Date(d + ‘T12:00:00’).toLocaleDateString(‘en-GB’, {weekday:‘short’, day:‘numeric’, month:‘short’}); }
catch(e) { return d; }
}
function fmtT(ts) {
if (!ts) return ‘’;
return new Date(ts).toLocaleTimeString(‘en-GB’, {hour:‘2-digit’, minute:‘2-digit’});
}
function fmtMon(d) {
if (!d) return ‘’;
try { return new Date(d + ‘T12:00:00’).toLocaleDateString(‘en-GB’, {month:‘long’, year:‘numeric’}); }
catch(e) { return d; }
}
function rpeC(r) {
if (!r) return ‘#4a5568’;
if (r <= 5) return ‘#10b981’;
if (r <= 7) return ‘#d97706’;
if (r === 8) return ‘#ea580c’;
return ‘#dc2626’;
}
function rpeN(r) {
if (!r) return ‘’;
var names = [’’,‘Easy’,‘Easy’,‘Easy’,‘Easy’,‘Easy’,‘Moderate’,‘Hard’,‘V.Hard’,‘Near Max’,‘MAX’];
return names[r] || ‘’;
}

function getCurr(cid) {
var id = cid || S.vCli || S.cid;
if (!id) return ‘GBP’;
var c = S.clients[id] || {};
return c.currency || ‘GBP’;
}
function currSym(cid) {
var c = getCurr(cid);
return c.split(’ ’)[1] || c;
}

function getProg(cid) {
var id = cid || S.cid;
var cp = id ? DB.get(‘cp_’ + id) : null;
var pid = cp ? cp.currentProgId : null;
var progs = getProgs(id);
if (pid) {
for (var i = 0; i < progs.length; i++) { if (progs[i].id === pid) return progs[i]; }
}
return progs[0] || null;
}
function getProgs(cid) {
var id = cid || S.cid;
return DB.get(‘progs_’ + id) || [];
}
function getDays(cid) { var p = getProg(cid); return p ? p.days || [] : []; }
function getDay() { return getDays()[S.day] || null; }
function getEx(ei) {
var d = getDay(); if (!d) return null;
var ex = d.ex[ei]; if (!ex) return null;
var sw = S.swaps[S.day + ‘_’ + ei];
if (sw !== undefined && ex.alt && ex.alt[sw]) {
return {n:ex.alt[sw], t:ex.t, m:ex.m, sets:ex.sets, r:ex.r, rest:ex.rest, note:ex.note, alt:ex.alt, swapped:true, orig:ex.n};
}
return ex;
}
function lk(w,d,e,s) { return ‘w’+w+’_d’+d+’_e’+e+’_s’+s; }
function ek(w,d,e) { return ‘w’+w+’_d’+d+’_e’+e; }
function sk(w,d) { return ‘w’+w+’*d’+d; }
function getL(w,d,e,s) { return S.logs[lk(w,d,e,s)] || null; }
function sessP() {
var d = getDay(); if (!d) return {done:0, total:0};
var done = 0, total = 0;
d.ex.forEach(function(ex, ei) {
var sc = ex.sets || 3; total += sc;
for (var i = 0; i < sc; i++) { var l = getL(S.week,S.day,ei,i); if (l && l.done) done++; }
});
return {done:done, total:total};
}
function updStreak() {
var t = today(), s = S.streak;
if (s.lastDate === t) return;
var y = new Date(); y.setDate(y.getDate() - 1);
var ys = y.toISOString().split(‘T’)[0];
var cur = s.lastDate === ys ? (s.cur || 0) + 1 : 1;
S.streak = {cur:cur, best:Math.max(cur, s.best||0), lastDate:t};
}
function chkPR(ei, weight, reps) {
var ex = getEx(ei); if (!ex || !weight) return;
var k = ex.n.replace(/[^a-zA-Z0-9]/g, ’*’);
var wt = parseFloat(weight) || 0, rp = parseInt(reps) || 0;
var est = wt * (1 + rp / 30);
var x = S.prs[k];
if (!x || est > (x.est || 0)) S.prs[k] = {weight:wt, reps:rp, est:est, date:today(), exName:ex.n};
}
function get14() {
var days = [];
for (var i = 13; i >= 0; i–) {
var dt = new Date(); dt.setDate(dt.getDate() - i);
days.push(dt.toISOString().split(‘T’)[0]);
}
return days;
}
function hadSess(d) {
return Object.keys(S.logs).some(function(k) {
var l = S.logs[k];
return l && l.done && l.ts && new Date(l.ts).toISOString().split(‘T’)[0] === d;
});
}

function saveLog(ei, si, weight, reps, rpe) {
var ex = getEx(ei); if (!ex) return;
var data = {weight:weight, reps:reps, rpe:rpe, done:true, ts:Date.now(), exName:ex.n};
var key = lk(S.week, S.day, ei, si);
S.logs[key] = data;
chkPR(ei, weight, reps);
updStreak();
DB.set(‘logs_’ + S.cid, S.logs);
DB.set(‘streak_’ + S.cid, S.streak);
DB.set(‘prs_’ + S.cid, S.prs);
}
function delLog(ei, si) {
var key = lk(S.week, S.day, ei, si);
delete S.logs[key];
DB.set(‘logs_’ + S.cid, S.logs);
}
function saveExNote(ei, text, from) {
var key = ek(S.week, S.day, ei);
S.exN[key] = S.exN[key] || {};
S.exN[key][from] = text;
DB.set(‘exnotes_’ + S.cid, S.exN);
}
function saveSessNote(text, from) {
var key = sk(S.week, S.day);
S.sN[key] = S.sN[key] || {};
S.sN[key][from] = text;
DB.set(‘sessnotes_’ + S.cid, S.sN);
}
function sendMsg(text, from, tCid) {
var cid = tCid || S.cid;
var msg = {id:‘m’+Date.now(), text:text.trim(), from:from, ts:Date.now(), read:false};
var msgs = DB.get(‘msgs_’ + cid) || [];
msgs.push(msg);
DB.set(‘msgs_’ + cid, msgs);
if (from === ‘client’ && cid === S.cid) S.msgs = msgs;
if (from === ‘trainer’ && S.cliData[cid]) {
S.cliData[cid].messages = S.cliData[cid].messages || {};
S.cliData[cid].messages[msg.id] = msg;
}
}
function readMsgs(cid, role) {
var other = role === ‘trainer’ ? ‘client’ : ‘trainer’;
var msgs = DB.get(‘msgs_’ + cid) || [];
var chg = false;
msgs.forEach(function(m) { if (m.from === other && !m.read) { m.read = true; chg = true; } });
if (chg) DB.set(‘msgs_’ + cid, msgs);
if (role === ‘client’) S.unread = msgs.filter(function(m){ return m.from === ‘trainer’ && !m.read; }).length;
}
function bookSess(cid, data) {
var id = ‘s’ + Date.now();
var sess = {id:id, status:‘upcoming’, created:Date.now()};
Object.keys(data).forEach(function(k){ sess[k] = data[k]; });
var local = DB.get(‘sessions_’ + cid) || {};
local[id] = sess;
DB.set(‘sessions_’ + cid, local);
if (!S.clients[cid]) S.clients[cid] = {};
if (!S.clients[cid].sessions) S.clients[cid].sessions = {};
S.clients[cid].sessions[id] = sess;
toast(‘Session booked’, ‘ok’);
}
function completeSess(cid, sessId) {
var local = DB.get(‘sessions_’ + cid) || {};
if (local[sessId]) local[sessId].status = ‘done’;
DB.set(‘sessions_’ + cid, local);
var bal = Math.max(0, (S.clients[cid] ? S.clients[cid].balance || 0 : 0) - 1);
if (S.clients[cid]) S.clients[cid].balance = bal;
if (S.clients[cid] && S.clients[cid].sessions && S.clients[cid].sessions[sessId]) {
S.clients[cid].sessions[sessId].status = ‘done’;
}
DB.set(‘tc’, S.clients);
toast(‘Session completed - 1 session deducted’, ‘ok’);
}
function logPay(cid, amount, note) {
var c = S.clients[cid] || {};
var rate = c.rate || 0;
var sessions = rate > 0 ? Math.round(amount / rate) : 0;
var pay = {id:‘p’+Date.now(), amount:amount, sessions:sessions, date:today(), ts:Date.now(), note:note||’’};
var pays = DB.get(‘payments_’ + cid) || {};
pays[pay.id] = pay;
DB.set(‘payments_’ + cid, pays);
if (!S.clients[cid]) S.clients[cid] = {};
S.clients[cid].balance = (S.clients[cid].balance || 0) + sessions;
if (!S.clients[cid].payments) S.clients[cid].payments = {};
S.clients[cid].payments[pay.id] = pay;
DB.set(‘tc’, S.clients);
toast(‘Payment logged - +’ + sessions + ’ sessions added’, ‘ok’);
R();
}

function loadAll() {
S.clients = DB.get(‘tc’) || {};
Object.keys(S.clients).forEach(function(cid) {
var c = S.clients[cid];
c.sessions = DB.get(‘sessions_’ + cid) || {};
c.payments = DB.get(‘payments_’ + cid) || {};
var msgs = DB.get(‘msgs_’ + cid) || [];
c.msgCount = msgs.filter(function(m){ return m.from === ‘client’ && !m.read; }).length;
});
}
function loadCliDetail(cid) {
var msgs = DB.get(‘msgs_’ + cid) || [];
var msgsObj = {};
msgs.forEach(function(m){ msgsObj[m.id || (‘m’+m.ts)] = m; });
S.cliData[cid] = {
logs: DB.get(‘logs_’ + cid) || {},
prs: DB.get(‘prs_’ + cid) || {},
streak: DB.get(‘streak_’ + cid) || {},
sessNotes: DB.get(‘sessnotes_’ + cid) || {},
exNotes: DB.get(‘exnotes_’ + cid) || {},
sessions: DB.get(‘sessions_’ + cid) || {},
payments: DB.get(‘payments_’ + cid) || {},
messages: msgsObj
};
if (S.clients[cid]) {
S.clients[cid].sessions = S.cliData[cid].sessions;
S.clients[cid].payments = S.cliData[cid].payments;
}
}

function doTCreate() {
var name = (document.getElementById(‘tname’) || {}).value || ‘’;
var pin = (document.getElementById(‘tnewpin’) || {}).value || ‘’;
name = name.trim(); pin = pin.trim();
var err = document.getElementById(‘tcreate_err’);
if (!name) { if(err) err.innerHTML=’<div class="err-msg">Enter your name</div>’; return; }
if (pin.length < 4) { if(err) err.innerHTML=’<div class="err-msg">PIN must be 4 digits</div>’; return; }
DB.set(‘trainer’, {name:name, pin:pin});
enterTrainer();
}
function doTLogin() {
var pin = ((document.getElementById(‘tpin’)||{}).value||’’).trim();
var st = DB.get(‘trainer’);
var err = document.getElementById(‘tlogin_err’);
if (!st) { if(err) err.innerHTML=’<div class="err-msg">No account yet - create one below</div>’; return; }
if (st.pin !== pin) { if(err) err.innerHTML=’<div class="err-msg">Incorrect PIN</div>’; return; }
enterTrainer();
}

S.role=‘trainer’; S.scr=‘trainer’; S.tTab=‘dash’;
DB.set(‘sess’, {role:‘trainer’});
loadAll();
R();
}
function doCLogin() {
var name = ((document.getElementById(‘cname’)||{}).value||’’).trim().toLowerCase();
var pin = ((document.getElementById(‘cpin’)||{}).value||’’).trim();
var err = document.getElementById(‘clogin_err’);
if (!name) { if(err) err.innerHTML=’<div class="err-msg">Enter your name</div>’; return; }
if (!pin) { if(err) err.innerHTML=’<div class="err-msg">Enter your PIN</div>’; return; }
var keys = Object.keys(localStorage).filter(function(k){ return k.startsWith(‘cp_’); });
var match = null;
for (var i = 0; i < keys.length; i++) {
var c = DB.get(keys[i]);
if (c && c.name && c.name.toLowerCase() === name && c.pin === pin) { match = keys[i].replace(‘cp_’,’’); break; }
}
if (!match) { if(err) err.innerHTML=’<div class="err-msg">Not found. Ask Ahmed to set you up on this device.</div>’; return; }
enterClient(match);
}
function enterClient(cid) {
var cp = DB.get(‘cp_’ + cid) || {};
S.role=‘client’; S.scr=‘client’; S.cid=cid; S.cTab=‘workout’;
S.unit=cp.unit||‘kg’; S.week=cp.week||1;
S.logs=DB.get(‘logs_’+cid)||{};
S.exN=DB.get(‘exnotes_’+cid)||{};
S.sN=DB.get(‘sessnotes_’+cid)||{};
S.msgs=DB.get(‘msgs_’+cid)||[];
S.streak=DB.get(‘streak_’+cid)||{cur:0,best:0,lastDate:null};
S.prs=DB.get(‘prs_’+cid)||{};
S.unread=S.msgs.filter(function(m){return m.from===‘trainer’&&!m.read;}).length;
DB.set(‘sess’, {role:‘client’, cid:cid});
R();
}
function doLogout() {
S.role=null; S.scr=‘login’; S.cid=null; S.vCli=null;
S.logs={}; S.msgs=[]; S.streak={cur:0,best:0,lastDate:null}; S.prs={};
DB.del(‘sess’); R();
}

function getUpcoming() {
var all = [];
Object.keys(S.clients).forEach(function(cid) {
var c = S.clients[cid];
Object.values(c.sessions||{}).forEach(function(s){
if (s.status===‘upcoming’) {
var item = {clientId:cid, clientName:c.name, clientType:c.type||‘inperson’};
Object.keys(s).forEach(function(k){ item[k]=s[k]; });
all.push(item);
}
});
});
return all.sort(function(a,b){ return ((a.date||’’)+(a.time||’’)).localeCompare((b.date||’’)+(b.time||’’)); });
}
function monthStats() {
var now = new Date();
var mn = now.getFullYear() + ‘-’ + String(now.getMonth()+1).padStart(2,‘0’);
var rev = 0, sessDone = 0, needPay = 0, alerts = [];
Object.keys(S.clients).forEach(function(cid) {
var c = S.clients[cid];
Object.values(c.payments||{}).forEach(function(p){ if(p.date&&p.date.startsWith(mn)) rev+=p.amount||0; });
Object.values(c.sessions||{}).forEach(function(s){ if(s.status===‘done’&&s.doneAt&&new Date(s.doneAt).toISOString().startsWith(mn)) sessDone++; });
var bal = c.balance||0;
if (bal===0) { needPay++; alerts.push({cid:cid,name:c.name,type:‘zero’,msg:‘No sessions left - needs payment’}); }
else if (bal<=2) alerts.push({cid:cid,name:c.name,type:‘low’,msg:‘Only ‘+bal+’ session’+(bal===1?’’:‘s’)+’ remaining’});
});
return {rev:rev, sessDone:sessDone, needPay:needPay, alerts:alerts};
}

var k2=‘w’+w+’_d’+d;
var day = cp && cp.days ? cp.days[d] : null;
if (!sess[k2]) sess[k2]={w:w,d:d,day:day,exLogs:{},sk:k2,ts:l.ts||0};

});
return Object.values(sess).sort(function(a,b){return b.ts-a.ts;});
}

function buildProgData(logs, cid) {

if(!exName){for(var pi=0;pi<progs.length;pi++){var pr=progs[pi];if(pr.days&&pr.days[d]&&pr.days[d].ex&&pr.days[d].ex[ei]){exName=pr.days[d].ex[ei].n;break;}}}

if(!ex[k])ex[k]={name:exName,bw:{}};
var wt=parseFloat(l.weight)||0;
if(!ex[k].bw[w]||wt>ex[k].bw[w])ex[k].bw[w]=wt;

‘</div></div>’ +
‘<div style="display:flex;gap:5px;align-items:center;flex-shrink:0">’ +
(hasAlt?’<button class="pill p-amber" onclick="event.stopPropagation();togAlt('+ei+')" style="cursor:pointer">swap</button>’:’’) +
‘<button onclick="event.stopPropagation();openYT(\''+ex.n.replace(/[^a-zA-Z0-9 ]/g,'').trim()+'\')" style="padding:3px 7px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:7px;color:#f87171;font-size:9px;font-weight:700;cursor:pointer">YT ▶</button>’ +

var k=exName.replace(/[^a-zA-Z0-9]/g,’*’);

var wt=parseFloat(l.weight)||0;

});

}
